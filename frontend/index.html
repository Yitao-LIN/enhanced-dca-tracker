<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enhanced DCA Investment Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg: #eef1f4;
        --surface: #ffffff;
        --surface-soft: #f7f8fa;
        --line: #d8dde5;
        --text: #182230;
        --muted: #627083;
        --blue: #185fa5;
        --green: #2f6b3f;
        --red: #a13b3b;
        --amber: #94630f;
        --ink: #243142;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        border-radius: 8px;
        min-height: 38px;
        padding: 0 12px;
        cursor: pointer;
      }

      button.primary {
        background: var(--ink);
        color: #ffffff;
        border-color: var(--ink);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      input[type="number"],
      input[type="text"],
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 38px;
        padding: 0 10px;
        background: var(--surface);
        color: var(--text);
      }

      .app {
        width: min(1380px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 26px;
        line-height: 1.2;
        font-weight: 650;
        letter-spacing: 0;
      }

      h2 {
        font-size: 16px;
        font-weight: 650;
      }

      h3 {
        font-size: 14px;
        font-weight: 650;
      }

      .subtitle {
        color: var(--muted);
        margin-top: 4px;
        font-size: 14px;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .workbench {
        grid-template-columns: minmax(0, 1.4fr) minmax(320px, 0.8fr);
        align-items: start;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .metric {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 15px;
      }

      .metric .label,
      label {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 7px;
      }

      .metric .value {
        font-size: 24px;
        line-height: 1.2;
        font-weight: 650;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 14px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .status {
        min-height: 20px;
        color: var(--muted);
        font-size: 13px;
        margin-top: 10px;
      }

      .positive {
        color: var(--green);
      }

      .negative {
        color: var(--red);
      }

      .warning {
        color: var(--amber);
      }

      .summary-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .mini-stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px;
        background: var(--surface-soft);
      }

      .mini-stat strong {
        display: block;
        font-size: 16px;
        line-height: 1.2;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 0 8px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .badge.new {
        border-color: rgba(47, 107, 63, 0.25);
        background: #eef7f0;
        color: var(--green);
      }

      .badge.duplicate {
        border-color: rgba(148, 99, 15, 0.25);
        background: #fff7e8;
        color: var(--amber);
      }

      .badge.invalid {
        border-color: rgba(161, 59, 59, 0.25);
        background: #fff0f0;
        color: var(--red);
      }

      .badge.mapping {
        border-color: rgba(24, 95, 165, 0.25);
        background: #edf5fc;
        color: var(--blue);
      }

      .preview-table {
        max-height: 320px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        margin-top: 12px;
      }

      .preview-table table {
        min-width: 760px;
      }

      .review-detail {
        min-width: 190px;
        white-space: normal;
      }

      .preview-outcome {
        margin-top: 12px;
      }

      .resolution-tasks {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .task-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: var(--surface-soft);
      }

      .task-card.invalid {
        border-color: rgba(161, 59, 59, 0.32);
        background: #fff7f7;
      }

      .task-header {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }

      .task-title {
        min-width: 0;
      }

      .task-title strong {
        display: block;
        overflow-wrap: anywhere;
      }

      .row-list {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }

      .mapping-controls {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) auto;
        gap: 6px;
        align-items: center;
        margin-top: 10px;
      }

      .mapping-note {
        color: var(--muted);
        font-size: 12px;
        margin-top: 6px;
      }

      .suggestion-list {
        display: grid;
        gap: 6px;
        margin-top: 8px;
      }

      .suggestion-row {
        display: grid;
        grid-template-columns: minmax(70px, auto) minmax(0, 1fr) minmax(100px, auto) auto;
        gap: 8px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px;
        background: var(--surface-soft);
        font-size: 12px;
      }

      .suggestion-row span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .suggestion-source {
        grid-column: 2 / 4;
        color: var(--muted);
        font-size: 11px;
      }

      .mapping-editor {
        border-top: 1px solid var(--line);
        margin-top: 14px;
        padding-top: 14px;
      }

      .mapping-editor table {
        min-width: 760px;
      }

      .mapping-editor input {
        min-width: 130px;
      }

      .mapping-editor .actions {
        flex-wrap: nowrap;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        padding: 10px 8px;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        text-align: left;
        font-weight: 600;
      }

      td.num,
      th.num {
        text-align: right;
      }

      .chart {
        height: 270px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-soft);
        overflow: hidden;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .legend {
        display: flex;
        gap: 14px;
        color: var(--muted);
        font-size: 12px;
        margin-top: 10px;
      }

      .key {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        display: inline-block;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .recommendation {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .amount {
        font-size: 34px;
        font-weight: 700;
        line-height: 1.1;
      }

      .note {
        background: #e7f0f8;
        color: #194c7d;
        border-radius: 8px;
        padding: 12px;
        font-size: 13px;
      }

      .drop {
        border: 1px dashed #aab4c1;
        background: var(--surface-soft);
        border-radius: 8px;
        padding: 12px;
      }

      .file {
        width: 100%;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 10px;
        color: var(--muted);
        font-size: 12px;
        background: var(--surface);
      }

      @media (max-width: 920px) {
        .metrics,
        .workbench,
        .controls,
        .summary-row {
          grid-template-columns: 1fr;
        }

        .topbar,
        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;
      const API_BASE_URL = localStorage.getItem("trackerApiBaseUrl") || "http://127.0.0.1:8000";

      const sampleCsv = `Date operation;Operation;Code valeur;Quantite;Prix unitaire;Frais;Devise;Compte;Libelle
15/01/2026;Achat;CW8.PA;3;470,50;1,95;EUR;PEA;Amundi MSCI World
15/02/2026;Achat;CW8.PA;2;480,10;1,95;EUR;PEA;Amundi MSCI World
15/03/2026;Achat;EWLD.PA;8;32,60;1,95;EUR;PEA;Amundi World
20/04/2026;Vente;EWLD.PA;2;34,20;1,95;EUR;PEA;Rebalance`;

      const initialPrices = {
        "CW8.PA": 510.2,
        "EWLD.PA": 35.4,
        "PX1": 8050,
        "^GSPC": 5260,
      };

      const emptyApiSummary = {
        total_value: 0,
        total_invested: 0,
        total_gain: 0,
        total_gain_percent: 0,
        holdings: [],
      };

      function money(value) {
        return new Intl.NumberFormat("fr-FR", {
          style: "currency",
          currency: "EUR",
          maximumFractionDigits: 2,
        }).format(Number.isFinite(value) ? value : 0);
      }

      function percent(value) {
        return `${value >= 0 ? "+" : ""}${value.toFixed(2)}%`;
      }

      function parseNumber(value) {
        if (!value) return 0;
        const normalized = String(value).replace(/\s/g, "").replace(/\./g, "").replace(",", ".");
        return Number(normalized.replace(/[^0-9.-]/g, "")) || 0;
      }

      function toNumber(value) {
        const number = Number(value);
        return Number.isFinite(number) ? number : 0;
      }

      async function apiRequest(path, options = {}) {
        let response;
        try {
          response = await fetch(`${API_BASE_URL}${path}`, options);
        } catch (error) {
          throw new Error(
            `Backend request failed before a response from ${API_BASE_URL}${path}. ` +
            `Check that FastAPI is running, then click Sync API. Browser error: ${error.message}`
          );
        }
        if (!response.ok) {
          const message = await response.text();
          throw new Error(message || `API request failed with ${response.status}`);
        }
        return response.json();
      }

      function splitCsvLine(line, delimiter) {
        const result = [];
        let current = "";
        let quoted = false;
        for (const char of line) {
          if (char === '"') quoted = !quoted;
          else if (char === delimiter && !quoted) {
            result.push(current);
            current = "";
          } else {
            current += char;
          }
        }
        result.push(current);
        return result.map((item) => item.trim());
      }

      function parseCsv(text) {
        const lines = text.split(/\r?\n/).filter((line) => line.trim());
        if (!lines.length) return [];
        const delimiter = lines[0].includes(";") ? ";" : ",";
        const headers = splitCsvLine(lines[0], delimiter).map((header) => header.toLowerCase());
        const indexOf = (...names) => headers.findIndex((header) => names.some((name) => header.includes(name)));
        const indexes = {
          date: indexOf("date"),
          type: indexOf("operation", "type", "sens"),
          ticker: indexOf("code valeur", "ticker", "symbol", "isin"),
          quantity: indexOf("quantite", "quantity", "shares", "qte"),
          price: indexOf("prix", "cours", "price"),
          fees: indexOf("frais", "fee", "commission"),
          currency: indexOf("devise", "currency"),
          account: indexOf("compte", "account"),
        };

        return lines.slice(1).map((line) => {
          const cells = splitCsvLine(line, delimiter);
          const rawType = (cells[indexes.type] || "").toLowerCase();
          const type = rawType.includes("vente") || rawType.includes("sell") ? "sell" : "buy";
          return {
            date: cells[indexes.date],
            type,
            ticker: (cells[indexes.ticker] || "").toUpperCase(),
            quantity: Math.abs(parseNumber(cells[indexes.quantity])),
            price: Math.abs(parseNumber(cells[indexes.price])),
            fees: Math.abs(parseNumber(cells[indexes.fees])),
            currency: cells[indexes.currency] || "EUR",
            account: cells[indexes.account] || "",
          };
        }).filter((row) => row.ticker && row.quantity > 0);
      }

      function buildHoldings(transactions, prices) {
        const lots = {};
        transactions.forEach((transaction) => {
          const key = transaction.ticker;
          lots[key] ||= { ticker: key, quantity: 0, cost: 0, currency: transaction.currency };
          if (transaction.type === "buy") {
            lots[key].quantity += transaction.quantity;
            lots[key].cost += transaction.quantity * transaction.price + transaction.fees;
          } else if (transaction.type === "sell" && lots[key].quantity > 0) {
            const sold = Math.min(transaction.quantity, lots[key].quantity);
            const avg = lots[key].cost / lots[key].quantity;
            lots[key].quantity -= sold;
            lots[key].cost -= avg * sold;
          }
        });

        const openLots = Object.values(lots).filter((lot) => lot.quantity > 0.0001);
        const totalValue = openLots.reduce((sum, lot) => sum + lot.quantity * (prices[lot.ticker] || lot.cost / lot.quantity), 0);
        return openLots.map((lot) => {
          const averageCost = lot.cost / lot.quantity;
          const currentPrice = prices[lot.ticker] || averageCost;
          const value = lot.quantity * currentPrice;
          const gain = value - lot.cost;
          return {
            ...lot,
            averageCost,
            currentPrice,
            value,
            gain,
            gainPercent: lot.cost ? (gain / lot.cost) * 100 : 0,
            allocation: totalValue ? (value / totalValue) * 100 : 0,
          };
        }).sort((a, b) => b.value - a.value);
      }

      function holdingsFromApi(summary) {
        return (summary.holdings || []).map((holding) => ({
          ticker: holding.ticker,
          quantity: toNumber(holding.quantity),
          cost: toNumber(holding.invested_amount),
          averageCost: toNumber(holding.average_cost),
          currentPrice: toNumber(holding.current_price),
          value: toNumber(holding.market_value),
          gain: toNumber(holding.unrealized_gain),
          gainPercent: toNumber(holding.unrealized_gain_percent),
          allocation: toNumber(holding.allocation_percent),
          currency: holding.currency || "EUR",
        }));
      }

      function calculateDca(baseAmount, marketChange, volatility) {
        let multiplier = 1;
        if (marketChange <= -5) multiplier = 1.5;
        else if (marketChange <= -3) multiplier = 1.3;
        else if (marketChange <= -1) multiplier = 1.2;
        else if (marketChange >= 5) multiplier = 0.7;
        else if (marketChange >= 3) multiplier = 0.8;

        if (volatility >= 30 && multiplier > 1) multiplier += 0.1;
        if (volatility <= 14 && multiplier > 1) multiplier -= 0.1;

        const adjusted = Math.round(baseAmount * multiplier);
        const action = multiplier > 1 ? "Increase" : multiplier < 1 ? "Decrease" : "Keep";
        const move = marketChange < 0 ? `market is down ${Math.abs(marketChange).toFixed(1)}%` : `market is up ${marketChange.toFixed(1)}%`;
        const reason = `${action} the next contribution because the ${move}${volatility >= 30 ? " and volatility is elevated" : ""}.`;
        return { adjusted, multiplier, reason };
      }

      function statusLabel(status) {
        const labels = {
          new: "New",
          duplicate_in_file: "Duplicate",
          duplicate_existing: "Existing",
          invalid: "Invalid",
          needs_mapping: "Map",
        };
        return labels[status] || status;
      }

      function statusClass(status) {
        if (status === "new") return "new";
        if (status === "invalid") return "invalid";
        if (status === "needs_mapping") return "mapping";
        if (status && status.startsWith("duplicate")) return "duplicate";
        return "";
      }

      function chartDate(value) {
        if (!value) return null;
        const date = new Date(`${value}T00:00:00`);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function chartDateLabel(value, rangeDays) {
        const date = chartDate(value);
        if (!date) return value;
        const options = rangeDays <= 90
          ? { day: "2-digit", month: "short" }
          : { month: "short", year: "2-digit" };
        return new Intl.DateTimeFormat("en-GB", options).format(date);
      }

      function chartRangeDays(data) {
        const first = chartDate(data[0]?.date);
        const last = chartDate(data[data.length - 1]?.date);
        if (!first || !last) return 0;
        return Math.abs(last - first) / 86400000;
      }

      function chartTickIndexes(data, maxTicks = 6) {
        if (data.length <= maxTicks) return data.map((_, index) => index);
        const lastIndex = data.length - 1;
        const indexes = new Set([0, lastIndex]);
        const step = lastIndex / (maxTicks - 1);
        for (let tick = 1; tick < maxTicks - 1; tick += 1) {
          indexes.add(Math.round(tick * step));
        }
        return Array.from(indexes).sort((a, b) => a - b);
      }

      function LineChart({ data }) {
        const width = 820;
        const height = 270;
        const pad = 34;
        const series = ["invested", "value", "sp500", "nasdaq100"];
        const values = data.flatMap((item) => series.map((key) => item[key]).filter((value) => Number.isFinite(value)));
        const max = Math.max(...values, 1);
        const min = Math.min(...values, 0);
        const rangeDays = chartRangeDays(data);
        const tickIndexes = chartTickIndexes(data);
        const x = (index) => pad + (index / Math.max(data.length - 1, 1)) * (width - pad * 2);
        const y = (value) => height - pad - ((value - min) / (max - min || 1)) * (height - pad * 2);
        const path = (key) => {
          let started = false;
          return data
            .map((item, index) => {
              if (!Number.isFinite(item[key])) {
                started = false;
                return "";
              }
              const command = started ? "L" : "M";
              started = true;
              return `${command}${x(index)},${y(item[key])}`;
            })
            .filter(Boolean)
            .join(" ");
        };

        return (
          <div className="chart">
            <svg viewBox={`0 0 ${width} ${height}`} role="img" aria-label="Portfolio performance chart">
              {[0, 1, 2, 3].map((line) => {
                const yy = pad + line * ((height - pad * 2) / 3);
                return <line key={line} x1={pad} y1={yy} x2={width - pad} y2={yy} stroke="#d8dde5" />;
              })}
              <path d={path("value")} fill="none" stroke="#185fa5" strokeWidth="3" />
              <path d={path("invested")} fill="none" stroke="#8090a5" strokeWidth="2.5" strokeDasharray="6 5" />
              {path("sp500") && <path d={path("sp500")} fill="none" stroke="#1c8c5a" strokeWidth="2.5" strokeDasharray="7 5" />}
              {path("nasdaq100") && <path d={path("nasdaq100")} fill="none" stroke="#b45f06" strokeWidth="2.5" strokeDasharray="4 5" />}
              {tickIndexes.map((index) => (
                <text key={`${data[index]?.date || data[index]?.month}-${index}`} x={x(index)} y={height - 10} textAnchor="middle" fontSize="11" fill="#627083">
                  {data[index]?.date ? chartDateLabel(data[index].date, rangeDays) : data[index]?.month}
                </text>
              ))}
            </svg>
          </div>
        );
      }

      function AllocationBars({ holdings }) {
        return (
          <div className="stack">
            {holdings.map((holding) => (
              <div key={holding.ticker}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 5 }}>
                  <strong>{holding.ticker}</strong>
                  <span>{holding.allocation.toFixed(1)}%</span>
                </div>
                <div style={{ height: 9, borderRadius: 99, background: "#edf0f4", overflow: "hidden" }}>
                  <div style={{ width: `${Math.min(holding.allocation, 100)}%`, height: "100%", background: "#185fa5" }} />
                </div>
              </div>
            ))}
          </div>
        );
      }

      function App() {
        const [transactions, setTransactions] = useState(() => parseCsv(sampleCsv));
        const [prices, setPrices] = useState(initialPrices);
        const [apiAvailable, setApiAvailable] = useState(false);
        const [apiLoading, setApiLoading] = useState(false);
        const [apiSummary, setApiSummary] = useState(emptyApiSummary);
        const [portfolios, setPortfolios] = useState([]);
        const [accounts, setAccounts] = useState([]);
        const [selectedPortfolioId, setSelectedPortfolioId] = useState("default");
        const [portfolioHistory, setPortfolioHistory] = useState([]);
        const [selectedBenchmark, setSelectedBenchmark] = useState("^GSPC");
        const [apiDca, setApiDca] = useState(null);
        const [baseAmount, setBaseAmount] = useState(1000);
        const [marketChange, setMarketChange] = useState(-2.3);
        const [volatility, setVolatility] = useState(18.5);
        const [importPreview, setImportPreview] = useState(null);
        const [pendingImportFile, setPendingImportFile] = useState(null);
        const [mappingSelections, setMappingSelections] = useState({});
        const [securityMappings, setSecurityMappings] = useState([]);
        const [mappingEditorOpen, setMappingEditorOpen] = useState(false);
        const [mappingDrafts, setMappingDrafts] = useState({});
        const [newMapping, setNewMapping] = useState({ security_label: "", ticker: "" });
        const [status, setStatus] = useState("Demo mode loaded. Start FastAPI on port 8000 to sync with the backend.");

        const demoHoldings = useMemo(() => buildHoldings(transactions, prices), [transactions, prices]);
        const apiHoldings = useMemo(() => holdingsFromApi(apiSummary), [apiSummary]);
        const holdings = apiAvailable ? apiHoldings : demoHoldings;
        const totalValue = apiAvailable ? toNumber(apiSummary.total_value) : holdings.reduce((sum, holding) => sum + holding.value, 0);
        const totalInvested = apiAvailable ? toNumber(apiSummary.total_invested) : holdings.reduce((sum, holding) => sum + holding.cost, 0);
        const totalGain = apiAvailable ? toNumber(apiSummary.total_gain) : totalValue - totalInvested;
        const totalGainPercent = apiAvailable ? toNumber(apiSummary.total_gain_percent) : totalInvested ? (totalGain / totalInvested) * 100 : 0;
        const dca = apiDca || calculateDca(baseAmount, marketChange, volatility);
        const previewRows = importPreview?.rows || [];
        const previewNewRows = previewRows.filter((row) => row.status === "new").length;
        const previewMappingRows = previewRows.filter((row) => row.status === "needs_mapping");
        const previewInvalidRows = previewRows.filter((row) => row.status === "invalid");
        const mappingGroups = useMemo(() => buildMappingGroups(previewMappingRows, mappingSelections), [previewMappingRows, mappingSelections]);
        const confirmedMappingGroups = mappingGroups.filter((group) => isMappingConfirmed(group));
        const unresolvedMappingCount = mappingGroups.length - confirmedMappingGroups.length;
        const confirmImportDisabledReason = getConfirmImportDisabledReason();
        const canConfirmImport = !confirmImportDisabledReason;
        const previewOutcome = getPreviewOutcome();

        const history = useMemo(() => {
          if (apiAvailable && portfolioHistory.length) {
            return portfolioHistory.map((point) => ({
              date: String(point.date),
              invested: toNumber(point.invested_amount),
              value: toNumber(point.market_value),
              sp500: point.benchmarks && point.benchmarks["^GSPC"] !== undefined ? toNumber(point.benchmarks["^GSPC"]) : undefined,
              nasdaq100: point.benchmarks && point.benchmarks["^NDX"] !== undefined ? toNumber(point.benchmarks["^NDX"]) : undefined,
            }));
          }
          const months = ["Jan", "Feb", "Mar", "Apr", "May", "Now"];
          return months.map((month, index) => {
            const ratio = (index + 1) / months.length;
            return {
              month,
              invested: totalInvested * ratio,
              value: totalInvested * ratio + totalGain * Math.pow(ratio, 1.3),
            };
          });
        }, [apiAvailable, portfolioHistory, totalInvested, totalGain]);

        useEffect(() => {
          connectBackend();
        }, []);

        useEffect(() => {
          if (apiAvailable) {
            clearImportPreview();
            refreshBackendData(selectedPortfolioId);
          }
        }, [selectedPortfolioId]);

        function mappingDraftsFromRows(rows) {
          return (rows || []).reduce((drafts, mapping) => {
            drafts[mapping.normalized_label] = mapping.ticker || "";
            return drafts;
          }, {});
        }

        function mappingKey(row) {
          return row.key || row.security_label || `row-${row.row_number}`;
        }

        function buildMappingGroups(rows, selections) {
          const groupsByKey = {};
          (rows || []).forEach((row) => {
            const key = mappingKey(row);
            const existing = groupsByKey[key];
            if (existing) {
              existing.rows.push(row);
              existing.rowNumbers.push(row.row_number);
              return;
            }
            const suggestion = (row.suggestions || [])[0];
            const selection = selections[key] || {
              ticker: suggestion?.symbol || "",
              confirmed: false,
            };
            groupsByKey[key] = {
              key,
              security_label: row.security_label,
              rows: [row],
              rowNumbers: [row.row_number],
              suggestions: row.suggestions || [],
              search_error: row.search_error,
              error: row.error,
              ticker: selection.ticker,
              confirmed: selection.confirmed,
            };
          });
          return Object.values(groupsByKey);
        }

        function initialMappingSelections(preview) {
          const selections = {};
          (preview?.rows || []).forEach((row) => {
            if (row.status !== "needs_mapping") return;
            const suggestion = (row.suggestions || [])[0];
            selections[mappingKey(row)] = {
              ticker: suggestion?.symbol || "",
              confirmed: false,
            };
          });
          return selections;
        }

        function mappingSelection(row) {
          return mappingSelections[mappingKey(row)] || {
            ticker: (row.suggestions || [])[0]?.symbol || "",
            confirmed: false,
          };
        }

        function isMappingConfirmed(row) {
          const selection = mappingSelection(row);
          return Boolean(selection.confirmed && String(selection.ticker || "").trim());
        }

        function getConfirmImportDisabledReason() {
          if (apiLoading) return "Waiting for the backend to finish.";
          if (!apiAvailable) return "Connect the backend before confirming an import.";
          if (!pendingImportFile || !importPreview) return "Choose a CSV or ZIP export to preview first.";
          if (importPreview.error_count > 0) return `Fix ${importPreview.error_count} invalid row(s) before importing.`;
          if (unresolvedMappingCount > 0) return `Confirm ${unresolvedMappingCount} mapping task(s) before importing.`;
          if (previewNewRows === 0 && previewMappingRows.length === 0) return "There are no new rows to import.";
          return "";
        }

        function getPreviewOutcome() {
          if (!importPreview) return "";
          if (importPreview.error_count > 0) {
            const wrongExport = previewInvalidRows.some(isWrongExportRow);
            return wrongExport
              ? "This file looks like the wrong Fortuneo export type. Use the bourse/investment history export."
              : `${importPreview.error_count} row(s) need attention before this file can be imported.`;
          }
          if (unresolvedMappingCount > 0) {
            return `${unresolvedMappingCount} mapping task(s) need confirmation. Confirmed mappings apply to every matching label in this preview.`;
          }
          if (previewNewRows === 0 && previewMappingRows.length === 0) {
            return "Everything in this preview already exists, so there is nothing new to import.";
          }
          const mappedRows = previewMappingRows.length;
          const parts = [];
          if (previewNewRows) parts.push(`${previewNewRows} new row(s)`);
          if (mappedRows) parts.push(`${mappedRows} mapped row(s)`);
          return `Ready to import ${parts.join(" and ")}.`;
        }

        function updateMappingTicker(row, ticker) {
          const key = mappingKey(row);
          setMappingSelections((current) => ({
            ...current,
            [key]: { ticker: String(ticker || "").toUpperCase(), confirmed: false },
          }));
        }

        function confirmMapping(row) {
          const key = mappingKey(row);
          const selection = mappingSelection(row);
          const ticker = String(selection.ticker || "").trim().toUpperCase();
          if (!ticker) return;
          setMappingSelections((current) => ({
            ...current,
            [key]: { ticker, confirmed: true },
          }));
        }

        function confirmedMappingsPayload() {
          const mappingsByLabel = {};
          mappingGroups
            .filter((group) => isMappingConfirmed(group))
            .forEach((group) => {
              const selection = mappingSelection(group);
              const ticker = String(selection.ticker || "").trim().toUpperCase();
              const suggestion = (group.suggestions || []).find((item) => String(item.symbol || "").toUpperCase() === ticker);
              mappingsByLabel[group.security_label] = {
                security_label: group.security_label,
                ticker,
                provider: suggestion?.source || "manual",
                provider_name: suggestion?.name || null,
                provider_exchange: suggestion?.exchange || null,
                provider_quote_type: suggestion?.quote_type || null,
                provider_currency: suggestion?.currency || null,
              };
            });
          return Object.values(mappingsByLabel);
        }

        function renderSuggestionRow(group, suggestion) {
          const market = [suggestion.exchange, suggestion.currency, suggestion.quote_type].filter(Boolean).join(" / ") || "-";
          const source = [suggestion.source, suggestion.query ? `query: ${suggestion.query}` : ""].filter(Boolean).join(" - ");
          return (
            <div className="suggestion-row" key={`${group.key}-${suggestion.symbol}`}>
              <strong>{suggestion.symbol}</strong>
              <span title={suggestion.name || suggestion.source}>{suggestion.name || suggestion.source}</span>
              <span title={market}>{market}</span>
              <button onClick={() => updateMappingTicker(group, suggestion.symbol)}>Use</button>
              <div className="suggestion-source">{source || "manual search result"}</div>
            </div>
          );
        }

        function renderMappingTask(group) {
          const selection = mappingSelection(group);
          const suggestions = group.suggestions || [];
          const ticker = selection.ticker || "";
          const datalistId = `mapping-suggestions-${group.rowNumbers[0]}`;
          return (
            <div className="task-card" key={group.key}>
              <div className="task-header">
                <div className="task-title">
                  <strong>{group.security_label || "Unlabeled security"}</strong>
                  <div className="row-list">Rows {group.rowNumbers.join(", ")}</div>
                </div>
                <span className={`badge ${selection.confirmed ? "new" : "mapping"}`}>{selection.confirmed ? "Confirmed" : "Mapping"}</span>
              </div>
              <div className="mapping-note">Confirming saves this ticker mapping for the selected portfolio.</div>
              <div className="mapping-controls">
                <input
                  type="text"
                  list={datalistId}
                  value={ticker}
                  aria-label={`Ticker for ${group.security_label || "security"}`}
                  onChange={(event) => updateMappingTicker(group, event.target.value)}
                />
                <datalist id={datalistId}>
                  {suggestions.map((suggestion) => (
                    <option key={suggestion.symbol} value={suggestion.symbol} label={[suggestion.name, suggestion.exchange, suggestion.currency].filter(Boolean).join(" - ")} />
                  ))}
                </datalist>
                <button disabled={!String(ticker).trim()} onClick={() => confirmMapping(group)}>
                  {selection.confirmed ? "Confirmed" : "Confirm"}
                </button>
              </div>
              {suggestions.length > 0 && (
                <div className="suggestion-list">
                  {suggestions.map((suggestion) => renderSuggestionRow(group, suggestion))}
                </div>
              )}
              {!group.search_error && suggestions.length === 0 && (
                <div className="mapping-note warning">No Yahoo suggestions found. Type the ticker manually, then confirm.</div>
              )}
              {group.search_error && <div className="mapping-note negative">Search failed: {group.search_error}. Type the ticker manually, then confirm.</div>}
              {selection.confirmed && <div className="mapping-note positive">Mapped to {String(ticker).toUpperCase()}</div>}
            </div>
          );
        }

        function isWrongExportRow(row) {
          return String(row.error || "").includes("Fortuneo bank-account export");
        }

        function rowReviewDetail(row) {
          if (row.status === "needs_mapping") return `Pending mapping: ${row.security_label || "unlabeled security"}`;
          if (row.status === "invalid") return row.error || "Invalid row";
          return row.account || row.description || "-";
        }

        function renderInvalidTask(row) {
          const wrongExport = isWrongExportRow(row);
          return (
            <div className="task-card invalid" key={`invalid-${row.row_number}`}>
              <div className="task-header">
                <div className="task-title">
                  <strong>{wrongExport ? "Wrong Fortuneo export type" : "Invalid row"}</strong>
                  <div className="row-list">Row {row.row_number}</div>
                </div>
                <span className="badge invalid">Blocked</span>
              </div>
              <div className="mapping-note negative">
                {wrongExport
                  ? "This is a bank-account export. Export the Fortuneo bourse/investment history instead."
                  : row.error}
              </div>
              {wrongExport && <div className="mapping-note">{row.error}</div>}
            </div>
          );
        }

        function renderResolutionTasks() {
          const taskCount = mappingGroups.length + previewInvalidRows.length;
          if (!taskCount) return null;
          return (
            <div className="resolution-tasks">
              <div className="toolbar" style={{ marginBottom: 0 }}>
                <h3>Resolution tasks</h3>
                <span className="subtitle">{taskCount} task(s)</span>
              </div>
              {mappingGroups.map((group) => renderMappingTask(group))}
              {previewInvalidRows.map((row) => renderInvalidTask(row))}
            </div>
          );
        }

        function renderMappingEditor() {
          return (
            <div className="mapping-editor">
              <div className="toolbar">
                <h3>Security mappings</h3>
                <span className="subtitle">{securityMappings.length} saved</span>
              </div>
              <div style={{ overflowX: "auto" }}>
                <table>
                  <thead>
                    <tr>
                      <th>Fortuneo label</th>
                      <th>Ticker</th>
                      <th>Source</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {securityMappings.map((mapping) => (
                      <tr key={mapping.normalized_label}>
                        <td><strong>{mapping.security_label}</strong></td>
                        <td>
                          <input
                            type="text"
                            value={mappingDrafts[mapping.normalized_label] ?? mapping.ticker}
                            aria-label={`Saved ticker for ${mapping.security_label}`}
                            onChange={(event) => updateSavedMappingDraft(mapping, event.target.value)}
                          />
                        </td>
                        <td>{[mapping.provider, mapping.provider_exchange, mapping.provider_currency].filter(Boolean).join(" / ") || "-"}</td>
                        <td>
                          <div className="actions">
                            <button disabled={!String(mappingDrafts[mapping.normalized_label] ?? mapping.ticker ?? "").trim()} onClick={() => saveSecurityMapping(mapping)}>Save</button>
                            <button onClick={() => deleteSavedMapping(mapping)}>Delete</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                    {!securityMappings.length && (
                      <tr>
                        <td colSpan={4} className="mapping-note">No saved mappings yet. Confirm a mapping during import or add one manually.</td>
                      </tr>
                    )}
                    <tr>
                      <td>
                        <input
                          type="text"
                          placeholder="Fortuneo label"
                          value={newMapping.security_label}
                          aria-label="New Fortuneo security label"
                          onChange={(event) => setNewMapping((current) => ({ ...current, security_label: event.target.value }))}
                        />
                      </td>
                      <td>
                        <input
                          type="text"
                          placeholder="Ticker"
                          value={newMapping.ticker}
                          aria-label="New ticker mapping"
                          onChange={(event) => setNewMapping((current) => ({ ...current, ticker: event.target.value.toUpperCase() }))}
                        />
                      </td>
                      <td>manual</td>
                      <td>
                        <button disabled={!newMapping.security_label.trim() || !newMapping.ticker.trim()} onClick={saveNewSecurityMapping}>Add mapping</button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        async function connectBackend() {
          setApiLoading(true);
          try {
            await apiRequest("/api/health");
            setApiAvailable(true);
            await refreshBackendData(selectedPortfolioId);
            setStatus(`Connected to backend at ${API_BASE_URL}.`);
          } catch (error) {
            setApiAvailable(false);
            setStatus("Backend unavailable. Demo mode is active.");
          } finally {
            setApiLoading(false);
          }
        }

        async function refreshBackendData(portfolioId = selectedPortfolioId) {
          setApiLoading(true);
          try {
            const [portfolioRows, accountRows, summary, historyRows, dcaSettings, mappingRows] = await Promise.all([
              apiRequest("/api/portfolios"),
              apiRequest(`/api/accounts?portfolio_id=${encodeURIComponent(portfolioId)}`),
              apiRequest(`/api/portfolio?portfolio_id=${encodeURIComponent(portfolioId)}`),
              apiRequest(`/api/portfolio/history?portfolio_id=${encodeURIComponent(portfolioId)}`),
              apiRequest(`/api/dca/settings?portfolio_id=${encodeURIComponent(portfolioId)}`),
              apiRequest(`/api/security-mappings?portfolio_id=${encodeURIComponent(portfolioId)}`),
            ]);
            setPortfolios(portfolioRows);
            setAccounts(accountRows);
            setApiSummary(summary);
            setPortfolioHistory(historyRows);
            setSecurityMappings(mappingRows);
            setMappingDrafts(mappingDraftsFromRows(mappingRows));
            setBaseAmount(toNumber(dcaSettings.base_amount) || 1000);
            setSelectedBenchmark(dcaSettings.preferred_benchmark || "^GSPC");
            setPrices((current) => ({
              ...current,
              ...(summary.holdings || []).reduce((nextPrices, holding) => {
                nextPrices[holding.ticker] = toNumber(holding.current_price);
                return nextPrices;
              }, {}),
            }));
            setApiAvailable(true);
          } catch (error) {
            setApiAvailable(false);
            setStatus(`Backend sync failed: ${error.message}`);
          } finally {
            setApiLoading(false);
          }
        }

        function updateSavedMappingDraft(mapping, ticker) {
          setMappingDrafts((current) => ({
            ...current,
            [mapping.normalized_label]: String(ticker || "").toUpperCase(),
          }));
        }

        async function saveSecurityMapping(mapping) {
          const ticker = String(mappingDrafts[mapping.normalized_label] ?? mapping.ticker ?? "").trim().toUpperCase();
          if (!ticker) return;
          const tickerChanged = ticker !== mapping.ticker;
          try {
            await apiRequest(`/api/security-mappings?portfolio_id=${encodeURIComponent(selectedPortfolioId)}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                security_label: mapping.security_label,
                ticker,
                provider: tickerChanged ? "manual" : mapping.provider,
                provider_name: tickerChanged ? null : mapping.provider_name,
                provider_exchange: tickerChanged ? null : mapping.provider_exchange,
                provider_quote_type: tickerChanged ? null : mapping.provider_quote_type,
                provider_currency: tickerChanged ? null : mapping.provider_currency,
              }),
            });
            await refreshBackendData(selectedPortfolioId);
            setStatus(`Saved mapping for ${mapping.security_label}.`);
          } catch (error) {
            setStatus(`Mapping save failed: ${error.message}`);
          }
        }

        async function deleteSavedMapping(mapping) {
          try {
            await apiRequest(`/api/security-mappings?portfolio_id=${encodeURIComponent(selectedPortfolioId)}&security_label=${encodeURIComponent(mapping.security_label)}`, {
              method: "DELETE",
            });
            await refreshBackendData(selectedPortfolioId);
            setStatus(`Deleted mapping for ${mapping.security_label}.`);
          } catch (error) {
            setStatus(`Mapping delete failed: ${error.message}`);
          }
        }

        async function saveNewSecurityMapping() {
          const securityLabel = String(newMapping.security_label || "").trim();
          const ticker = String(newMapping.ticker || "").trim().toUpperCase();
          if (!securityLabel || !ticker) return;
          try {
            await apiRequest(`/api/security-mappings?portfolio_id=${encodeURIComponent(selectedPortfolioId)}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                security_label: securityLabel,
                ticker,
                provider: "manual",
              }),
            });
            setNewMapping({ security_label: "", ticker: "" });
            await refreshBackendData(selectedPortfolioId);
            setStatus(`Added mapping for ${securityLabel}.`);
          } catch (error) {
            setStatus(`Mapping add failed: ${error.message}`);
          }
        }

        async function backfillBenchmarks() {
          if (!apiAvailable) return;
          setApiLoading(true);
          const end = new Date();
          const start = new Date();
          start.setFullYear(end.getFullYear() - 1);
          try {
            const payload = {
              symbols: ["^GSPC", "^NDX"],
              start_date: start.toISOString().slice(0, 10),
              end_date: end.toISOString().slice(0, 10),
              currency: "USD",
              source: "yfinance",
            };
            const result = await apiRequest("/api/market/history/backfill", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            await refreshBackendData(selectedPortfolioId);
            setStatus(`Backfilled ${result.updated} benchmark price row(s) for S&P 500 and Nasdaq 100.`);
          } catch (error) {
            setStatus(`Benchmark backfill failed: ${error.message}`);
          } finally {
            setApiLoading(false);
          }
        }

        async function saveDcaSettings() {
          if (!apiAvailable) return;
          try {
            await apiRequest("/api/dca/settings", {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                portfolio_id: selectedPortfolioId,
                base_amount: baseAmount,
                preferred_benchmark: selectedBenchmark,
                min_multiplier: 0.7,
                max_multiplier: 1.5,
                contribution_frequency: "monthly",
              }),
            });
            setStatus("Saved DCA settings.");
          } catch (error) {
            setStatus(`DCA settings save failed: ${error.message}`);
          }
        }

        async function refreshBenchmarkDca() {
          if (!apiAvailable) return;
          try {
            const recommendation = await apiRequest("/api/dca/recommendation", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                portfolio_id: selectedPortfolioId,
                base_amount: baseAmount,
                benchmark_symbol: selectedBenchmark,
                volatility_index: volatility,
              }),
            });
            setApiDca({
              adjusted: toNumber(recommendation.adjusted_amount),
              multiplier: toNumber(recommendation.multiplier),
              reason: recommendation.reason,
            });
            setMarketChange(toNumber(recommendation.market_change_percent));
            setStatus(`DCA recommendation refreshed from ${selectedBenchmark}.`);
          } catch (error) {
            setStatus(`DCA recommendation failed: ${error.message}`);
          }
        }

        async function importFile(event) {
          const file = event.target.files?.[0];
          if (!file) return;
          if (apiAvailable) {
            const formData = new FormData();
            formData.append("file", file);
            setApiLoading(true);
            try {
              const preview = await apiRequest(`/api/transactions/preview?portfolio_id=${encodeURIComponent(selectedPortfolioId)}`, {
                method: "POST",
                body: formData,
              });
              setPendingImportFile(file);
              setImportPreview(preview);
              setMappingSelections(initialMappingSelections(preview));
              const newRows = (preview.rows || []).filter((row) => row.status === "new").length;
              const mappingRows = (preview.rows || []).filter((row) => row.status === "needs_mapping").length;
              setStatus(`Reviewed ${preview.row_count} row(s) from ${file.name}: ${newRows} new, ${mappingRows} mapping(s), ${preview.duplicate_count} duplicate(s), ${preview.error_count} error(s).`);
            } catch (error) {
              clearImportPreview();
              setStatus(`Preview failed: ${error.message}`);
            } finally {
              setApiLoading(false);
              event.target.value = "";
            }
          } else {
            const text = await file.text();
            const parsed = parseCsv(text);
            setTransactions(parsed);
            setStatus(`Imported ${parsed.length} transaction rows from ${file.name} in demo mode.`);
          }
        }

        async function confirmImport() {
          if (!canConfirmImport) return;
          const file = pendingImportFile;
          const formData = new FormData();
          formData.append("file", file);
          const confirmedMappings = confirmedMappingsPayload();
          if (confirmedMappings.length) {
            formData.append("mappings", JSON.stringify(confirmedMappings));
          }
          setApiLoading(true);
          try {
            const summary = await apiRequest(`/api/transactions/upload?portfolio_id=${encodeURIComponent(selectedPortfolioId)}`, {
              method: "POST",
              body: formData,
            });
            clearImportPreview();
            await refreshBackendData(selectedPortfolioId);
            setStatus(`Imported ${summary.imported} row(s), skipped ${summary.duplicates} duplicate(s) from ${file.name}.`);
          } catch (error) {
            setStatus(`Import failed: ${error.message}`);
          } finally {
            setApiLoading(false);
          }
        }

        function clearImportPreview() {
          setImportPreview(null);
          setPendingImportFile(null);
          setMappingSelections({});
        }

        function updatePrice(ticker, value) {
          setPrices((current) => ({ ...current, [ticker]: parseNumber(value) }));
        }

        async function saveMarketPrice(ticker, value) {
          updatePrice(ticker, value);
          if (!apiAvailable) return;
          try {
            await apiRequest("/api/market/prices", {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ prices: { [ticker]: parseNumber(value) } }),
            });
            await refreshBackendData(selectedPortfolioId);
            setStatus(`Saved market price for ${ticker}.`);
          } catch (error) {
            setStatus(`Price update failed: ${error.message}`);
          }
        }

        function simulateMarket() {
          const next = Number((Math.random() * 10 - 5).toFixed(1));
          setApiDca(null);
          setMarketChange(next);
          setVolatility(Number((15 + Math.random() * 18).toFixed(1)));
        }

        return (
          <main className="app">
            <header className="topbar">
              <div>
                <h1>Enhanced DCA Investment Tracker</h1>
                <p className="subtitle">Portfolio import, performance tracking, market context, and next contribution sizing.</p>
              </div>
              <div className="actions">
                <span className="pill">{apiAvailable ? "Backend connected" : "Demo mode"}</span>
                <button disabled={apiLoading} onClick={connectBackend}>{apiAvailable ? "Sync API" : "Connect API"}</button>
                <button onClick={() => { clearImportPreview(); setApiAvailable(false); setTransactions(parseCsv(sampleCsv)); setSecurityMappings([]); setMappingDrafts({}); setMappingEditorOpen(false); setStatus("Demo data restored."); }}>Demo data</button>
                <button className="primary" onClick={simulateMarket}>Refresh market simulation</button>
              </div>
            </header>

            <section className="grid metrics" aria-label="Portfolio metrics">
              <div className="metric">
                <div className="label">Total value</div>
                <div className="value">{money(totalValue)}</div>
              </div>
              <div className="metric">
                <div className="label">Invested amount</div>
                <div className="value">{money(totalInvested)}</div>
              </div>
              <div className="metric">
                <div className="label">Unrealized gain</div>
                <div className={`value ${totalGain >= 0 ? "positive" : "negative"}`}>{money(totalGain)}</div>
              </div>
              <div className="metric">
                <div className="label">Return</div>
                <div className={`value ${totalGain >= 0 ? "positive" : "negative"}`}>{percent(totalGainPercent)}</div>
              </div>
            </section>

            <section className="grid workbench" style={{ marginTop: 14 }}>
              <div className="stack">
                <div className="panel">
                  <div className="toolbar">
                    <h2>Portfolio Performance</h2>
                    <div className="legend">
                      <span className="key"><span className="dot" style={{ background: "#8090a5" }} />Invested</span>
                      <span className="key"><span className="dot" style={{ background: "#185fa5" }} />Value</span>
                      <span className="key"><span className="dot" style={{ background: "#1c8c5a" }} />S&P 500</span>
                      <span className="key"><span className="dot" style={{ background: "#b45f06" }} />Nasdaq 100</span>
                    </div>
                  </div>
                  <LineChart data={history} />
                  {apiAvailable && (
                    <button disabled={apiLoading} style={{ marginTop: 12 }} onClick={backfillBenchmarks}>Backfill benchmarks</button>
                  )}
                </div>

                <div className="panel">
                  <div className="toolbar">
                    <h2>Holdings</h2>
                    <div className="actions">
                      <span className="subtitle">{holdings.length} open positions</span>
                      {apiAvailable && (
                        <button onClick={() => setMappingEditorOpen((open) => !open)}>
                          {mappingEditorOpen ? "Hide mappings" : "Edit mappings"}
                        </button>
                      )}
                    </div>
                  </div>
                  <div style={{ overflowX: "auto" }}>
                    <table>
                      <thead>
                        <tr>
                          <th>Ticker</th>
                          <th className="num">Qty</th>
                          <th className="num">Avg cost</th>
                          <th className="num">Market price</th>
                          <th className="num">Value</th>
                          <th className="num">Gain</th>
                          <th className="num">Allocation</th>
                        </tr>
                      </thead>
                      <tbody>
                        {holdings.map((holding) => (
                          <tr key={holding.ticker}>
                            <td><strong>{holding.ticker}</strong></td>
                            <td className="num">{holding.quantity.toFixed(4)}</td>
                            <td className="num">{money(holding.averageCost)}</td>
                            <td className="num">
                              <input
                                type="text"
                                aria-label={`${holding.ticker} market price`}
                                value={prices[holding.ticker] ?? holding.currentPrice ?? ""}
                                onChange={(event) => updatePrice(holding.ticker, event.target.value)}
                                onBlur={(event) => saveMarketPrice(holding.ticker, event.target.value)}
                                style={{ maxWidth: 110, textAlign: "right" }}
                              />
                            </td>
                            <td className="num">{money(holding.value)}</td>
                            <td className={`num ${holding.gain >= 0 ? "positive" : "negative"}`}>{money(holding.gain)} ({percent(holding.gainPercent)})</td>
                            <td className="num">{holding.allocation.toFixed(1)}%</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  {apiAvailable && mappingEditorOpen && renderMappingEditor()}
                </div>
              </div>

              <aside className="stack">
                <div className="panel">
                  <h2>Fortuneo Import</h2>
                  <div style={{ marginTop: 12 }}>
                    <label htmlFor="portfolio">Portfolio</label>
                    <select
                      id="portfolio"
                      value={selectedPortfolioId}
                      disabled={!apiAvailable || apiLoading}
                      onChange={(event) => setSelectedPortfolioId(event.target.value)}
                    >
                      {(portfolios.length ? portfolios : [{ id: "default", name: "Default Portfolio" }]).map((portfolio) => (
                        <option key={portfolio.id} value={portfolio.id}>{portfolio.name}</option>
                      ))}
                    </select>
                  </div>
                  {apiAvailable && (
                    <p className="status">{accounts.length ? `${accounts.length} account(s): ${accounts.map((account) => account.name).join(", ")}` : "No accounts yet for this portfolio."}</p>
                  )}
                  <div className="drop" style={{ marginTop: 12 }}>
                    <label htmlFor="csv">CSV file</label>
                    <input className="file" id="csv" type="file" accept=".csv,.zip,text/csv,application/zip" disabled={apiLoading} onChange={importFile} />
                  </div>
                  {apiAvailable && importPreview && (
                    <div>
                      <div className="summary-row">
                        <div className="mini-stat">
                          <span className="label">Rows</span>
                          <strong>{importPreview.row_count}</strong>
                        </div>
                        <div className="mini-stat">
                          <span className="label">New</span>
                          <strong className="positive">{previewNewRows}</strong>
                        </div>
                        <div className="mini-stat">
                          <span className="label">Mappings</span>
                          <strong className={unresolvedMappingCount ? "warning" : ""}>{confirmedMappingGroups.length}/{mappingGroups.length}</strong>
                        </div>
                        <div className="mini-stat">
                          <span className="label">Duplicates</span>
                          <strong className="warning">{importPreview.duplicate_count}</strong>
                        </div>
                        <div className="mini-stat">
                          <span className="label">Errors</span>
                          <strong className={importPreview.error_count ? "negative" : ""}>{importPreview.error_count}</strong>
                        </div>
                      </div>
                      {previewOutcome && <div className="note preview-outcome">{previewOutcome}</div>}
                      {renderResolutionTasks()}
                      <div className="preview-table">
                        <table>
                          <thead>
                            <tr>
                              <th>Row</th>
                              <th>Status</th>
                              <th>Date</th>
                              <th>Ticker</th>
                              <th>Type</th>
                              <th className="num">Qty</th>
                              <th className="num">Price</th>
                              <th>Review</th>
                            </tr>
                          </thead>
                          <tbody>
                            {previewRows.map((row) => (
                              <tr key={row.row_number}>
                                <td>{row.row_number}</td>
                                <td><span className={`badge ${statusClass(row.status)}`}>{statusLabel(row.status)}</span></td>
                                <td>{row.transaction_date || "-"}</td>
                                <td><strong>{row.ticker || "-"}</strong></td>
                                <td>{row.transaction_type || "-"}</td>
                                <td className="num">{row.quantity ?? "-"}</td>
                                <td className="num">{row.price ?? "-"}</td>
                                <td className={`review-detail ${row.status === "invalid" ? "negative" : ""}`} title={row.error || row.security_label || row.description || row.account || ""}>
                                  {rowReviewDetail(row)}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      <div className="actions" style={{ marginTop: 12 }}>
                        <button className="primary" disabled={!canConfirmImport} onClick={confirmImport}>Confirm import</button>
                        <button disabled={apiLoading} onClick={clearImportPreview}>Clear</button>
                      </div>
                      {confirmImportDisabledReason && <p className="status">{confirmImportDisabledReason}</p>}
                    </div>
                  )}
                  <p className="status">{status}</p>
                </div>

                <div className="panel">
                  <h2>Enhanced DCA</h2>
                  <div className="controls" style={{ marginTop: 12 }}>
                    <div>
                      <label>Base amount</label>
                      <input type="number" value={baseAmount} min="0" step="50" onChange={(event) => { setApiDca(null); setBaseAmount(Number(event.target.value)); }} />
                    </div>
                    <div>
                      <label>Benchmark</label>
                      <select value={selectedBenchmark} onChange={(event) => { setApiDca(null); setSelectedBenchmark(event.target.value); }}>
                        <option value="^GSPC">S&P 500</option>
                        <option value="^NDX">Nasdaq 100</option>
                      </select>
                    </div>
                    <div>
                      <label>Market change %</label>
                      <input type="number" value={marketChange} step="0.1" onChange={(event) => { setApiDca(null); setMarketChange(Number(event.target.value)); }} />
                    </div>
                    <div>
                      <label>VIX</label>
                      <input type="number" value={volatility} step="0.1" onChange={(event) => { setApiDca(null); setVolatility(Number(event.target.value)); }} />
                    </div>
                  </div>
                  {apiAvailable && (
                    <div className="actions" style={{ marginTop: 12 }}>
                      <button onClick={saveDcaSettings}>Save settings</button>
                      <button className="primary" onClick={refreshBenchmarkDca}>Use benchmark</button>
                    </div>
                  )}
                  <div className="recommendation">
                    <span className="label">Next investment amount</span>
                    <div className={`amount ${dca.adjusted > baseAmount ? "positive" : dca.adjusted < baseAmount ? "warning" : ""}`}>{money(dca.adjusted)}</div>
                    <div className="note">{dca.reason} Multiplier: {dca.multiplier.toFixed(2)}x.</div>
                  </div>
                </div>

                <div className="panel">
                  <div className="toolbar">
                    <h2>Allocation</h2>
                  </div>
                  <AllocationBars holdings={holdings} />
                </div>
              </aside>
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
