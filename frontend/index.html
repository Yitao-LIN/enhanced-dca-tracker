        const [mappingSelections, setMappingSelections] = useState({});
        const [mappingSearchDrafts, setMappingSearchDrafts] = useState({});
        const [mappingSuggestionOverrides, setMappingSuggestionOverrides] = useState({});
        const [mappingSearchStatus, setMappingSearchStatus] = useState({});
        const [securityMappings, setSecurityMappings] = useState([]);
        const [mappingEditorOpen, setMappingEditorOpen] = useState(false);
        const [mappingDrafts, setMappingDrafts] = useState({});
        const [newMapping, setNewMapping] = useState({ security_label: "", ticker: "" });
        const [manualDraft, setManualDraft] = useState(() => defaultManualTransactionDraft());
        const [manualSearchQuery, setManualSearchQuery] = useState("");
        const [manualSearchResults, setManualSearchResults] = useState([]);
        const [manualSearchStatus, setManualSearchStatus] = useState("");
        const [status, setStatus] = useState("Demo mode loaded. Start FastAPI on port 8000 to sync with the backend.");

        const demoHoldings = useMemo(() => buildHoldings(transactions, prices), [transactions, prices]);
        const apiHoldings = useMemo(() => holdingsFromApi(apiSummary), [apiSummary]);
        const holdings = apiAvailable ? apiHoldings : demoHoldings;
        const totalValue = apiAvailable ? toNumber(apiSummary.total_value) : holdings.reduce((sum, holding) => sum + holding.value, 0);
        const totalInvested = apiAvailable ? toNumber(apiSummary.total_invested) : holdings.reduce((sum, holding) => sum + holding.cost, 0);
        const totalGain = apiAvailable ? toNumber(apiSummary.total_gain) : totalValue - totalInvested;
        const totalGainPercent = apiAvailable ? toNumber(apiSummary.total_gain_percent) : totalInvested ? (totalGain / totalInvested) * 100 : 0;
        const analyticsRows = apiAvailable ? analyticsRowsFromApi(portfolioAnalytics) : demoAllocationRows(holdings);
        const monthlyActivity = portfolioAnalytics.monthly_activity || [];
        const benchmarkComparison = portfolioAnalytics.benchmark_comparison || [];
        const totalTargetPercent = apiAvailable ? toNumber(portfolioAnalytics.total_target_percent) : 0;
        const unassignedTargetPercent = apiAvailable ? toNumber(portfolioAnalytics.unassigned_target_percent) : 100;
        const dcaBaseAmount = toNumber(dcaDraft.base_amount);
        const dca = apiDca || calculateDca(dcaDraft.model_type, dcaBaseAmount, marketChange, volatility);
        const previewRows = importPreview?.rows || [];
        const previewNewRows = previewRows.filter((row) => row.status === "new").length;
        const previewMappingRows = previewRows.filter((row) => row.status === "needs_mapping");
        const previewInvalidRows = previewRows.filter((row) => row.status === "invalid");
        const mappingGroups = useMemo(
          () => buildMappingGroups(previewMappingRows, mappingSelections),
          [previewMappingRows, mappingSelections, mappingSuggestionOverrides],
        );
        const confirmedMappingGroups = mappingGroups.filter((group) => isMappingConfirmed(group));
        const unresolvedMappingCount = mappingGroups.length - confirmedMappingGroups.length;
        const confirmImportDisabledReason = getConfirmImportDisabledReason();
        const canConfirmImport = !confirmImportDisabledReason;
        const manualTransactionDisabledReason = getManualTransactionDisabledReason();
        const canSaveManualTransaction = !manualTransactionDisabledReason;
        const previewOutcome = getPreviewOutcome();

        const history = useMemo(() => {
          if (apiAvailable && portfolioHistory.length) {
            return portfolioHistory.map((point) => ({
              date: String(point.timestamp || point.date),
              invested: toNumber(point.invested_amount),
              value: toNumber(point.market_value),
              sp500: point.benchmarks && point.benchmarks["^GSPC"] !== undefined ? toNumber(point.benchmarks["^GSPC"]) : undefined,
              nasdaq100: point.benchmarks && point.benchmarks["^NDX"] !== undefined ? toNumber(point.benchmarks["^NDX"]) : undefined,
            }));
          }
          if (apiAvailable) {
            return [];
          }
          const months = ["Jan", "Feb", "Mar", "Apr", "May", "Now"];
          return months.map((month, index) => {
            const ratio = (index + 1) / months.length;
            return {
              month,
              invested: totalInvested * ratio,
              value: totalInvested * ratio + totalGain * Math.pow(ratio, 1.3),
            };
          });
        }, [apiAvailable, portfolioHistory, totalInvested, totalGain]);

        useEffect(() => {
          connectBackend();
        }, []);

        useEffect(() => {
          if (apiAvailable) {
            clearImportPreview();
            refreshBackendData(selectedPortfolioId, { autoBackfill: true });
          }
        }, [selectedPortfolioId]);

        useEffect(() => {
          if (apiAvailable) {
            refreshBackendData(selectedPortfolioId, { autoBackfill: true, quiet: true });
          }
        }, [chartRange]);

        function mappingDraftsFromRows(rows) {
          return (rows || []).reduce((drafts, mapping) => {
            drafts[mapping.normalized_label] = mapping.ticker || "";
            return drafts;
          }, {});
        }

        function mappingKey(row) {
          return row.key || row.security_label || `row-${row.row_number}`;
        }

        function mergeSuggestions(items) {
          const seen = new Set();
          return (items || []).filter((item) => {
            const symbol = String(item?.symbol || "").toUpperCase();
            if (!symbol || seen.has(symbol)) return false;
            seen.add(symbol);
            return true;
          });
        }

        function buildMappingGroups(rows, selections) {
          const groupsByKey = {};
          (rows || []).forEach((row) => {
            const key = mappingKey(row);
            const suggestions = mergeSuggestions([
              ...(row.suggestions || []),
              ...(mappingSuggestionOverrides[key] || []),
            ]);
            const existing = groupsByKey[key];
            if (existing) {
              existing.rows.push(row);
              existing.rowNumbers.push(row.row_number);
              existing.suggestions = mergeSuggestions([
                ...existing.suggestions,
                ...(row.suggestions || []),
                ...(mappingSuggestionOverrides[key] || []),
              ]);
              return;
            }
            const suggestion = suggestions[0];
            const selection = selections[key] || {
              ticker: suggestion?.symbol || "",
              confirmed: false,
            };
            groupsByKey[key] = {
              key,
              security_label: row.security_label,
              rows: [row],
              rowNumbers: [row.row_number],
              suggestions,
              search_error: row.search_error,
              error: row.error,
              ticker: selection.ticker,
              confirmed: selection.confirmed,
            };
          });
          return Object.values(groupsByKey);
        }

        function initialMappingSelections(preview) {
          const selections = {};
          (preview?.rows || []).forEach((row) => {
            if (row.status !== "needs_mapping") return;
            const suggestion = (row.suggestions || [])[0];
            selections[mappingKey(row)] = {
              ticker: suggestion?.symbol || "",
              confirmed: false,
            };
          });
          return selections;
        }

        function mappingSelection(row) {
          return mappingSelections[mappingKey(row)] || {
            ticker: (row.suggestions || [])[0]?.symbol || "",
            confirmed: false,
          };
        }

        function isMappingConfirmed(row) {
          const selection = mappingSelection(row);
          return Boolean(selection.confirmed && String(selection.ticker || "").trim());
        }

        function getConfirmImportDisabledReason() {
          if (apiLoading) return "Waiting for the backend to finish.";
          if (!apiAvailable) return "Connect the backend before confirming an import.";
          if (!pendingImportFile || !importPreview) return "Choose a CSV or ZIP export to preview first.";
          if (importPreview.error_count > 0) return `Fix ${importPreview.error_count} invalid row(s) before importing.`;
          if (unresolvedMappingCount > 0) return `Confirm ${unresolvedMappingCount} mapping task(s) before importing.`;
          if (previewNewRows === 0 && previewMappingRows.length === 0) return "There are no new rows to import.";
          return "";
        }

        function getPreviewOutcome() {
          if (!importPreview) return "";
          if (importPreview.error_count > 0) {
            const wrongExport = previewInvalidRows.some(isWrongExportRow);
            return wrongExport
              ? "This file looks like the wrong Fortuneo export type. Use the bourse/investment history export."
              : `${importPreview.error_count} row(s) need attention before this file can be imported.`;
          }
          if (unresolvedMappingCount > 0) {
            return `${unresolvedMappingCount} mapping task(s) need confirmation. Confirmed mappings apply to every matching label in this preview.`;
          }
          if (previewNewRows === 0 && previewMappingRows.length === 0) {
            return "Everything in this preview already exists, so there is nothing new to import.";
          }
          const mappedRows = previewMappingRows.length;
          const parts = [];
          if (previewNewRows) parts.push(`${previewNewRows} new row(s)`);
          if (mappedRows) parts.push(`${mappedRows} mapped row(s)`);
          return `Ready to import ${parts.join(" and ")}.`;
        }

        function updateMappingTicker(row, ticker) {
          const key = mappingKey(row);
          setMappingSelections((current) => ({
            ...current,
            [key]: { ticker: String(ticker || "").toUpperCase(), confirmed: false },
          }));
        }

        function confirmMapping(row) {
          const key = mappingKey(row);
          const selection = mappingSelection(row);
          const ticker = String(selection.ticker || "").trim().toUpperCase();
          if (!ticker) return;
          setMappingSelections((current) => ({
            ...current,
            [key]: { ticker, confirmed: true },
          }));
        }

        async function searchMappingSuggestions(group) {
          const key = mappingKey(group);
          const query = String(mappingSearchDrafts[key] || group.security_label || "").trim();
          if (!query) return;
          setMappingSearchStatus((current) => ({ ...current, [key]: "Searching..." }));
          try {
            const results = await apiRequest(`/api/securities/search?query=${encodeURIComponent(query)}&limit=10`);
            setMappingSuggestionOverrides((current) => ({
              ...current,
              [key]: mergeSuggestions([...(current[key] || []), ...results]),
            }));
            if (results[0] && !String(mappingSelection(group).ticker || "").trim()) {
              updateMappingTicker(group, results[0].symbol);
            }
            setMappingSearchStatus((current) => ({
              ...current,
              [key]: results.length ? `Found ${results.length} result(s) for ${query}.` : `No results for ${query}.`,
            }));
          } catch (error) {
            setMappingSearchStatus((current) => ({ ...current, [key]: `Search failed: ${error.message}` }));
          }
        }

        function confirmedMappingsPayload() {
          const mappingsByLabel = {};
          mappingGroups
            .filter((group) => isMappingConfirmed(group))
            .forEach((group) => {
              const selection = mappingSelection(group);
              const ticker = String(selection.ticker || "").trim().toUpperCase();
              const suggestion = (group.suggestions || []).find((item) => String(item.symbol || "").toUpperCase() === ticker);
              mappingsByLabel[group.security_label] = {
                security_label: group.security_label,
                ticker,
                provider: suggestion?.source || "manual",
                provider_name: suggestion?.name || null,
                provider_exchange: suggestion?.exchange || null,
                provider_quote_type: suggestion?.quote_type || null,
                provider_currency: suggestion?.currency || null,
              };
            });
          return Object.values(mappingsByLabel);
        }

        function renderSuggestionRow(group, suggestion) {
          const market = [suggestion.exchange, suggestion.currency, suggestion.quote_type].filter(Boolean).join(" / ") || "-";
          const source = [suggestion.source, suggestion.query ? `query: ${suggestion.query}` : ""].filter(Boolean).join(" - ");
          return (
            <div className="suggestion-row" key={`${group.key}-${suggestion.symbol}`}>
              <strong>{suggestion.symbol}</strong>
              <span title={suggestion.name || suggestion.source}>{suggestion.name || suggestion.source}</span>
              <span title={market}>{market}</span>
              <button onClick={() => updateMappingTicker(group, suggestion.symbol)}>Use</button>
              <div className="suggestion-source">{source || "manual search result"}</div>
            </div>
          );
        }

        function renderMappingTask(group) {
          const selection = mappingSelection(group);
          const suggestions = group.suggestions || [];
          const ticker = selection.ticker || "";
          const datalistId = `mapping-suggestions-${group.rowNumbers[0]}`;
          const searchDraft = mappingSearchDrafts[group.key] ?? group.security_label ?? "";
          const searchStatus = mappingSearchStatus[group.key] || "";
          return (
            <div className="task-card" key={group.key}>
              <div className="task-header">
                <div className="task-title">
                  <strong>{group.security_label || "Unlabeled security"}</strong>
                  <div className="row-list">Rows {group.rowNumbers.join(", ")}</div>
                </div>
                <span className={`badge ${selection.confirmed ? "new" : "mapping"}`}>{selection.confirmed ? "Confirmed" : "Mapping"}</span>
              </div>
              <div className="mapping-note">Confirming saves this ticker mapping for the selected portfolio.</div>
              <div className="mapping-controls">
                <input
                  type="text"
                  list={datalistId}
                  value={ticker}
                  aria-label={`Ticker for ${group.security_label || "security"}`}
                  onChange={(event) => updateMappingTicker(group, event.target.value)}
                />
                <datalist id={datalistId}>
                  {suggestions.map((suggestion) => (
                    <option key={suggestion.symbol} value={suggestion.symbol} label={[suggestion.name, suggestion.exchange, suggestion.currency].filter(Boolean).join(" - ")} />
                  ))}
                </datalist>
                <button disabled={!String(ticker).trim()} onClick={() => confirmMapping(group)}>
                  {selection.confirmed ? "Confirmed" : "Confirm"}
                </button>
              </div>
              <div className="mapping-search">
                <input
                  type="text"
                  value={searchDraft}
                  aria-label={`Search Yahoo for ${group.security_label || "security"}`}
                  onChange={(event) => setMappingSearchDrafts((current) => ({ ...current, [group.key]: event.target.value }))}
                  onKeyDown={(event) => {
                    if (event.key === "Enter") {
                      event.preventDefault();
                      searchMappingSuggestions(group);
                    }
                  }}
                />
                <button disabled={!searchDraft.trim()} onClick={() => searchMappingSuggestions(group)}>Search</button>
              </div>
              {searchStatus && <div className={`mapping-note ${searchStatus.startsWith("Search failed") ? "negative" : ""}`}>{searchStatus}</div>}
              {suggestions.length > 0 && (
                <div className="suggestion-list">
                  {suggestions.map((suggestion) => renderSuggestionRow(group, suggestion))}
                </div>
              )}
              {!group.search_error && suggestions.length === 0 && (
                <div className="mapping-note warning">No Yahoo suggestions found. Type the ticker manually, then confirm.</div>
              )}
              {group.search_error && <div className="mapping-note negative">Search failed: {group.search_error}. Type the ticker manually, then confirm.</div>}
              {selection.confirmed && <div className="mapping-note positive">Mapped to {String(ticker).toUpperCase()}</div>}
            </div>
          );
        }

        function isWrongExportRow(row) {
          return String(row.error || "").includes("Fortuneo bank-account export");
        }

        function rowReviewDetail(row) {
          if (row.status === "needs_mapping") return `Pending mapping: ${row.security_label || "unlabeled security"}`;
          if (row.status === "invalid") return row.error || "Invalid row";
          return row.account || row.description || "-";
        }

        function renderInvalidTask(row) {
          const wrongExport = isWrongExportRow(row);
          return (
            <div className="task-card invalid" key={`invalid-${row.row_number}`}>
              <div className="task-header">
                <div className="task-title">
                  <strong>{wrongExport ? "Wrong Fortuneo export type" : "Invalid row"}</strong>
                  <div className="row-list">Row {row.row_number}</div>
                </div>
                <span className="badge invalid">Blocked</span>
              </div>
              <div className="mapping-note negative">
                {wrongExport
                  ? "This is a bank-account export. Export the Fortuneo bourse/investment history instead."
                  : row.error}
              </div>
              {wrongExport && <div className="mapping-note">{row.error}</div>}
            </div>
          );
        }

        function renderResolutionTasks() {
          const taskCount = mappingGroups.length + previewInvalidRows.length;
          if (!taskCount) return null;
          return (
            <div className="resolution-tasks">
              <div className="toolbar" style={{ marginBottom: 0 }}>
                <h3>Resolution tasks</h3>
                <span className="subtitle">{taskCount} task(s)</span>
              </div>
              {mappingGroups.map((group) => renderMappingTask(group))}
              {previewInvalidRows.map((row) => renderInvalidTask(row))}
            </div>
          );
        }

        function renderMappingEditor() {
          return (
            <div className="mapping-editor">
              <div className="toolbar">
                <h3>Security mappings</h3>
                <span className="subtitle">{securityMappings.length} saved</span>
              </div>
              <div style={{ overflowX: "auto" }}>
                <table>
                  <thead>
                    <tr>
                      <th>Fortuneo label</th>
                      <th>Ticker</th>
                      <th>Source</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {securityMappings.map((mapping) => (
                      <tr key={mapping.normalized_label}>
                        <td><strong>{mapping.security_label}</strong></td>
                        <td>
                          <input
                            type="text"
                            value={mappingDrafts[mapping.normalized_label] ?? mapping.ticker}
                            aria-label={`Saved ticker for ${mapping.security_label}`}
                            onChange={(event) => updateSavedMappingDraft(mapping, event.target.value)}
                          />
                        </td>
                        <td>{[mapping.provider, mapping.provider_exchange, mapping.provider_currency].filter(Boolean).join(" / ") || "-"}</td>
                        <td>
                          <div className="actions">
                            <button disabled={!String(mappingDrafts[mapping.normalized_label] ?? mapping.ticker ?? "").trim()} onClick={() => saveSecurityMapping(mapping)}>Save</button>
                            <button onClick={() => deleteSavedMapping(mapping)}>Delete</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                    {!securityMappings.length && (
                      <tr>
                        <td colSpan={4} className="mapping-note">No saved mappings yet. Confirm a mapping during import or add one manually.</td>
                      </tr>
                    )}
                    <tr>
                      <td>
                        <input
                          type="text"
                          placeholder="Fortuneo label"
                          value={newMapping.security_label}
                          aria-label="New Fortuneo security label"
                          onChange={(event) => setNewMapping((current) => ({ ...current, security_label: event.target.value }))}
                        />
                      </td>
                      <td>
                        <input
                          type="text"
                          placeholder="Ticker"
                          value={newMapping.ticker}
                          aria-label="New ticker mapping"
                          onChange={(event) => setNewMapping((current) => ({ ...current, ticker: event.target.value.toUpperCase() }))}
                        />
                      </td>
                      <td>manual</td>
                      <td>
                        <button disabled={!newMapping.security_label.trim() || !newMapping.ticker.trim()} onClick={saveNewSecurityMapping}>Add mapping</button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        /** @brief Probe FastAPI and load backend-backed dashboard state. */
        async function connectBackend() {
          setApiLoading(true);
          try {
            await apiRequest("/api/health");
            setApiAvailable(true);
            setStatus(`Connected to backend at ${API_BASE_URL}.`);
            await refreshBackendData(selectedPortfolioId, { autoBackfill: true });
          } catch (error) {
            setApiAvailable(false);
            setPortfolioAnalytics(emptyPortfolioAnalytics);
            setAllocationTargets([]);
            setTargetDrafts({});
            setDcaPlans([]);
            setSelectedDcaPlanId("");
            setDcaDraft(defaultDcaDraft(selectedPortfolioId));
            setManualDraft(defaultManualTransactionDraft());
            setManualSearchQuery("");
            setManualSearchResults([]);
            setManualSearchStatus("");
            setStatus("Backend unavailable. Demo mode is active.");
          } finally {
            setApiLoading(false);
          }
        }

        function historyQuery(portfolioId = selectedPortfolioId) {
          return queryString({
            portfolio_id: portfolioId,
            ...chartDateRange(chartRange),
          });
        }

        /** @brief Select the daily or intraday history endpoint for the active chart range. */
        function historyPath(portfolioId = selectedPortfolioId) {
          if (isIntradayRange(chartRange)) {
            return `/api/portfolio/history/intraday?${queryString({
              portfolio_id: portfolioId,
              ...chartDateTimeRange(chartRange),
            })}`;
          }
          return `/api/portfolio/history?${historyQuery(portfolioId)}`;
        }

        /** @brief Build the analytics endpoint URL for the selected portfolio and date range. */
        function analyticsPath(portfolioId = selectedPortfolioId) {
          return `/api/portfolio/analytics?${queryString({
            portfolio_id: portfolioId,
            ...chartDateRange(chartRange),
          })}`;
        }

        /** @brief Refresh all backend-backed state needed by the dashboard in one pass. */
        async function refreshBackendData(portfolioId = selectedPortfolioId, options = {}) {
          const { autoBackfill = false, quiet = false } = options;
          setApiLoading(true);
          try {
            const [portfolioRows, accountRows, summary, historyRows, dcaPlanRows, mappingRows, hiddenRows, targetRows, analytics] = await Promise.all([
              apiRequest("/api/portfolios"),
              apiRequest(`/api/accounts?portfolio_id=${encodeURIComponent(portfolioId)}`),
              apiRequest(`/api/portfolio?portfolio_id=${encodeURIComponent(portfolioId)}`),
              apiRequest(historyPath(portfolioId)),
              apiRequest(`/api/dca/plans?portfolio_id=${encodeURIComponent(portfolioId)}`),
              apiRequest(`/api/security-mappings?portfolio_id=${encodeURIComponent(portfolioId)}`),
              apiRequest(`/api/hidden-securities?portfolio_id=${encodeURIComponent(portfolioId)}`),
              apiRequest(`/api/allocation-targets?portfolio_id=${encodeURIComponent(portfolioId)}`),
              apiRequest(analyticsPath(portfolioId)),
            ]);
            setPortfolios(portfolioRows);
            setAccounts(accountRows);
            setApiSummary(summary);
            setPortfolioHistory(historyRows);
            setSecurityMappings(mappingRows);
            setHiddenSecurities(hiddenRows);
            setAllocationTargets(targetRows);
            setPortfolioAnalytics(analytics);
            setTargetDrafts(targetDraftsFromRows(targetRows, analytics.allocation_drift || []));
            setMappingDrafts(mappingDraftsFromRows(mappingRows));
            setDcaPlans(dcaPlanRows);
            const activePlan = dcaPlanRows.find((plan) => String(plan.id) === String(selectedDcaPlanId)) || dcaPlanRows.find((plan) => plan.is_default) || dcaPlanRows[0];
            setSelectedDcaPlanId(activePlan ? String(activePlan.id) : "");
            setDcaDraft(dcaDraftFromPlan(activePlan, portfolioId));
            setApiDca(null);
            setPrices((current) => ({
              ...current,
              ...(summary.holdings || []).reduce((nextPrices, holding) => {
                nextPrices[holding.ticker] = toNumber(holding.current_price);
                return nextPrices;
              }, {}),
            }));
            setApiAvailable(true);
            if (autoBackfill) {
              const result = await backfillMarketHistory(portfolioId, summary.holdings || [], historyRows);
              if (result) {
                const refreshed = await Promise.all([
                  apiRequest(`/api/portfolio?portfolio_id=${encodeURIComponent(portfolioId)}`),
                  apiRequest(historyPath(portfolioId)),
                  apiRequest(`/api/hidden-securities?portfolio_id=${encodeURIComponent(portfolioId)}`),
                  apiRequest(analyticsPath(portfolioId)),
                ]);
                setApiSummary(refreshed[0]);
                setPortfolioHistory(refreshed[1]);
                setHiddenSecurities(refreshed[2]);
                setPortfolioAnalytics(refreshed[3]);
                setTargetDrafts(targetDraftsFromRows(targetRows, refreshed[3].allocation_drift || []));
                const skipped = result.failures || [];
                const noIntradayRows = isIntradayRange(chartRange) && result.updated === 0 && skipped.length > 0;
                if (!quiet || noIntradayRows) {
                  if (noIntradayRows) {
                    setStatus(`Intraday market data was unavailable for ${skipped.map((failure) => failure.symbol).join(", ")}. Showing stored daily history for this range.`);
                    return;
                  }
                  const skippedText = skipped.length ? ` Skipped ${skipped.map((failure) => failure.symbol).join(", ")}.` : "";
                  setStatus(`Backfilled ${result.updated} market history row(s).${skippedText}`);
                }
              }
            }
          } catch (error) {
            setApiAvailable(false);
            setPortfolioAnalytics(emptyPortfolioAnalytics);
            setAllocationTargets([]);
            setTargetDrafts({});
            setDcaPlans([]);
            setSelectedDcaPlanId("");
            setDcaDraft(defaultDcaDraft(portfolioId));
            setManualDraft(defaultManualTransactionDraft());
            setManualSearchQuery("");
            setManualSearchResults([]);
            setManualSearchStatus("");
            setStatus(`Backend sync failed: ${error.message}`);
          } finally {
            setApiLoading(false);
          }
        }

        function updateManualDraft(field, value) {
          setManualDraft((current) => ({
            ...current,
            [field]: field === "ticker" || field === "currency" ? String(value || "").toUpperCase() : value,
            ...(field === "transaction_type" ? { quantity: "", price: "", amount: "", fees: "0" } : {}),
          }));
        }

        async function searchManualTransactionMapping() {
          const query = String(manualSearchQuery || manualDraft.description || manualDraft.ticker || "").trim();
          if (!query) {
            setManualSearchStatus("Enter a security name, ISIN, or ticker to search.");
            return;
          }
          setManualSearchStatus("Searching...");
          try {
            const results = await apiRequest(`/api/securities/search?query=${encodeURIComponent(query)}&limit=10`);
            setManualSearchResults(results);
            if (results[0] && !String(manualDraft.ticker || "").trim()) {
              updateManualDraft("ticker", results[0].symbol);
            }
            setManualSearchStatus(results.length ? `Found ${results.length} result(s) for ${query}.` : `No results for ${query}.`);
          } catch (error) {
            setManualSearchStatus(`Search failed: ${error.message}`);
          }
        }

        function useManualSearchResult(result) {
          updateManualDraft("ticker", result.symbol);
          if (!String(manualDraft.description || "").trim() && result.name) {
            updateManualDraft("description", result.name);
          }
          setManualSearchStatus(`Selected ${result.symbol}.`);
        }

        function getManualTransactionDisabledReason() {
          if (!apiAvailable) return "Connect API to add manual transactions.";
          if (!manualDraft.transaction_date) return "Choose a transaction date.";
          if (!String(manualDraft.ticker || "").trim()) return "Enter a ticker.";
          const fees = parseNumber(manualDraft.fees);
          if (fees < 0) return "Fees must be zero or greater.";
          if (manualDraft.transaction_type === "buy" || manualDraft.transaction_type === "sell") {
            if (parseNumber(manualDraft.quantity) <= 0) return "Enter a quantity greater than zero.";
            if (parseNumber(manualDraft.price) <= 0) return "Enter a price greater than zero.";
            return "";
          }
          const amount = parseNumber(manualDraft.amount);
          if (amount <= 0) return "Enter an amount greater than zero.";
          return "";
        }

        function manualTransactionPayload() {
          const type = manualDraft.transaction_type;
          const amount = parseNumber(manualDraft.amount);
          const trade = type === "buy" || type === "sell";
          return {
            portfolio_id: selectedPortfolioId,
            transaction_date: manualDraft.transaction_date,
            ticker: String(manualDraft.ticker || "").trim().toUpperCase(),
            transaction_type: type,
            quantity: trade ? parseNumber(manualDraft.quantity) : type === "dividend" ? 1 : 0,
            price: trade ? parseNumber(manualDraft.price) : type === "dividend" ? amount : 0,
            fees: type === "fee" || type === "cash" ? amount : parseNumber(manualDraft.fees),
            currency: String(manualDraft.currency || "EUR").trim().toUpperCase(),
            account: String(manualDraft.account || "").trim() || null,
            description: String(manualDraft.description || "").trim() || null,
          };
        }

        async function saveManualTransaction(event) {
          event.preventDefault();
          const disabledReason = getManualTransactionDisabledReason();
          if (disabledReason) {
            setStatus(disabledReason);
            return;
          }
          const payload = manualTransactionPayload();
          setApiLoading(true);
          try {
            const result = await apiRequest("/api/transactions", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            await refreshBackendData(selectedPortfolioId, { autoBackfill: true });
            setManualDraft((current) => ({
              ...defaultManualTransactionDraft(),
              currency: current.currency || "EUR",
              account: current.account || "",
            }));
            setManualSearchQuery("");
            setManualSearchResults([]);
            setManualSearchStatus("");
            setStatus(result.created ? `Added ${payload.transaction_type} transaction for ${payload.ticker}.` : `Skipped duplicate transaction for ${payload.ticker}.`);
          } catch (error) {
            setStatus(`Manual transaction failed: ${error.message}`);
          } finally {
            setApiLoading(false);
          }
        }

        function updateSavedMappingDraft(mapping, ticker) {
          setMappingDrafts((current) => ({
            ...current,
            [mapping.normalized_label]: String(ticker || "").toUpperCase(),
          }));
        }

        async function saveSecurityMapping(mapping) {
          const ticker = String(mappingDrafts[mapping.normalized_label] ?? mapping.ticker ?? "").trim().toUpperCase();
          if (!ticker) return;
          const tickerChanged = ticker !== mapping.ticker;
          try {
            await apiRequest(`/api/security-mappings?portfolio_id=${encodeURIComponent(selectedPortfolioId)}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                security_label: mapping.security_label,
                ticker,
                provider: tickerChanged ? "manual" : mapping.provider,
                provider_name: tickerChanged ? null : mapping.provider_name,
                provider_exchange: tickerChanged ? null : mapping.provider_exchange,
                provider_quote_type: tickerChanged ? null : mapping.provider_quote_type,
                provider_currency: tickerChanged ? null : mapping.provider_currency,
              }),
            });
            await refreshBackendData(selectedPortfolioId);
            setStatus(`Saved mapping for ${mapping.security_label}.`);
          } catch (error) {
            setStatus(`Mapping save failed: ${error.message}`);
          }
        }

        async function deleteSavedMapping(mapping) {
          try {
            await apiRequest(`/api/security-mappings?portfolio_id=${encodeURIComponent(selectedPortfolioId)}&security_label=${encodeURIComponent(mapping.security_label)}`, {
              method: "DELETE",
            });
            await refreshBackendData(selectedPortfolioId);
            setStatus(`Deleted mapping for ${mapping.security_label}.`);
          } catch (error) {
            setStatus(`Mapping delete failed: ${error.message}`);
          }
        }

        async function saveNewSecurityMapping() {
          const securityLabel = String(newMapping.security_label || "").trim();
          const ticker = String(newMapping.ticker || "").trim().toUpperCase();
          if (!securityLabel || !ticker) return;
          try {
            await apiRequest(`/api/security-mappings?portfolio_id=${encodeURIComponent(selectedPortfolioId)}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                security_label: securityLabel,
                ticker,
                provider: "manual",
              }),
            });
            setNewMapping({ security_label: "", ticker: "" });
            await refreshBackendData(selectedPortfolioId);
            setStatus(`Added mapping for ${securityLabel}.`);
          } catch (error) {
            setStatus(`Mapping add failed: ${error.message}`);
          }
        }

        /** @brief Hide a ticker from tracking without deleting source transactions. */
        async function hideSecurity(ticker) {
          const symbol = String(ticker || "").trim().toUpperCase();
          if (!apiAvailable || !symbol) return;
          try {
            await apiRequest(`/api/hidden-securities?portfolio_id=${encodeURIComponent(selectedPortfolioId)}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ ticker: symbol }),
            });
            await refreshBackendData(selectedPortfolioId, { autoBackfill: false });
            setStatus(`${symbol} hidden from tracking.`);
          } catch (error) {
            setStatus(`Hide failed: ${error.message}`);
          }
        }

        /** @brief Restore a previously hidden ticker to tracking views. */
        async function restoreSecurity(ticker) {
          const symbol = String(ticker || "").trim().toUpperCase();
          if (!apiAvailable || !symbol) return;
          try {
            await apiRequest(`/api/hidden-securities?portfolio_id=${encodeURIComponent(selectedPortfolioId)}&ticker=${encodeURIComponent(symbol)}`, {
              method: "DELETE",
            });
            await refreshBackendData(selectedPortfolioId, { autoBackfill: false });
            setStatus(`${symbol} restored to tracking.`);
          } catch (error) {

          const symbol = String(ticker || "").trim().toUpperCase();
          if (!apiAvailable || !symbol) return;
          const confirmed = window.confirm(`Delete all imported transactions for ${symbol}? You can import them again later.`);
          if (!confirmed) return;
          try {
            const result = await apiRequest(`/api/transactions/${encodeURIComponent(symbol)}?portfolio_id=${encodeURIComponent(selectedPortfolioId)}`, {
              method: "DELETE",
            });
            await refreshBackendData(selectedPortfolioId, { autoBackfill: false });
            setStatus(`Deleted ${result.deleted} transaction(s) for ${symbol}. You can import them again.`);
          } catch (error) {
            setStatus(`Delete failed: ${error.message}`);
          }
        }

          if (!symbol) return;
          setTargetDrafts((current) => ({
            ...current,

          }));

            setAllocationTargets(records);

        /** @brief Backfill daily or intraday market history for visible holdings and benchmarks. */
        async function backfillMarketHistory(portfolioId, visibleHoldings, historyRows = []) {
          const symbols = Array.from(new Set([
            ...(visibleHoldings || []).map((holding) => holding.ticker),
            ...BENCHMARK_SYMBOLS,
          ].filter(Boolean).map((symbol) => String(symbol).toUpperCase()))).sort();
          if (!symbols.length) return null;
          try {
            if (isIntradayRange(chartRange)) {
              // Short chart ranges prefer intraday rows; the backend can fall back to daily rows.
              const range = chartDateTimeRange(chartRange);
              return await apiRequest("/api/market/intraday/backfill", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  symbols,
                  start_at: range.start_at,
                  end_at: range.end_at,
                  interval: range.interval,
                  currency: "USD",
                  source: "yfinance",
                }),
              });
            }
            const range = chartDateRange(chartRange);
            if (!range.start_date) {
              range.start_date = historyRows[0]?.date;
              if (!range.start_date) {
                const start = new Date();
                start.setFullYear(start.getFullYear() - 5);
                range.start_date = isoDate(start);
              }
            }
            const payload = {
              symbols,
              start_date: range.start_date,
              end_date: range.end_date,
              currency: "USD",
              source: "yfinance",
            };
            return await apiRequest("/api/market/history/backfill", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
          } catch (error) {
            setStatus(`Automatic market backfill failed: ${error.message}`);
            return null;
          }
        }

          const updating = selectedDcaPlanId && dcaPlans.some((plan) => String(plan.id) === String(selectedDcaPlanId));
          try {

        /** @brief Compute a recommendation from the selected saved DCA plan. */
        async function refreshDcaRecommendation() {
          if (!apiAvailable) return;
          if (!selectedDcaPlanId) {
            setStatus("Select or save a DCA plan before computing a recommendation.");
            return;
          }
          try {
            const recommendation = await apiRequest(`/api/dca/plans/${encodeURIComponent(selectedDcaPlanId)}/recommendation`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(dcaDraft.model_type === "enhanced" ? {
                market_change_percent: marketChange,
                volatility_index: volatility,
              } : {}),
            });
            setApiDca({
              adjusted: toNumber(recommendation.adjusted_amount),
              multiplier: toNumber(recommendation.multiplier),
              reason: recommendation.reason,
              allocationSuggestions: recommendation.allocation_suggestions || [],
            });
            setMarketChange(toNumber(recommendation.market_change_percent));
            setStatus(`DCA recommendation refreshed from ${recommendation.plan_name}.`);
          } catch (error) {
            setStatus(`DCA recommendation failed: ${error.message}`);
          }
        }

        /** @brief Preview a selected CSV/ZIP through the backend, or parse locally in demo mode. */
        async function importFile(event) {
          const file = event.target.files?.[0];
          if (!file) return;
          if (apiAvailable) {
            const formData = new FormData();
            formData.append("file", file);
            setApiLoading(true);
            try {
              const preview = await apiRequest(`/api/transactions/preview?portfolio_id=${encodeURIComponent(selectedPortfolioId)}`, {
                method: "POST",
                body: formData,
              });
              setPendingImportFile(file);
              setImportPreview(preview);
              setMappingSelections(initialMappingSelections(preview));
              setMappingSearchDrafts({});
              setMappingSuggestionOverrides({});
              setMappingSearchStatus({});
              const newRows = (preview.rows || []).filter((row) => row.status === "new").length;
              const mappingRows = (preview.rows || []).filter((row) => row.status === "needs_mapping").length;
              setStatus(`Reviewed ${preview.row_count} row(s) from ${file.name}: ${newRows} new, ${mappingRows} mapping(s), ${preview.duplicate_count} duplicate(s), ${preview.error_count} error(s).`);
            } catch (error) {
              clearImportPreview();
              setStatus(`Preview failed: ${error.message}`);
            } finally {
              setApiLoading(false);
              event.target.value = "";
            }
          } else {
            const text = await file.text();
            const parsed = parseCsv(text);
            setTransactions(parsed);
            setStatus(`Imported ${parsed.length} transaction rows from ${file.name} in demo mode.`);
          }
        }

        /** @brief Upload the pending file plus confirmed security mappings to the backend. */
        async function confirmImport() {
          if (!canConfirmImport) return;
          const file = pendingImportFile;
          const formData = new FormData();
          formData.append("file", file);
          const confirmedMappings = confirmedMappingsPayload();
          if (confirmedMappings.length) {
            formData.append("mappings", JSON.stringify(confirmedMappings));
          }
          setApiLoading(true);
          try {
            const summary = await apiRequest(`/api/transactions/upload?portfolio_id=${encodeURIComponent(selectedPortfolioId)}`, {
              method: "POST",
              body: formData,
            });
            clearImportPreview();
            await refreshBackendData(selectedPortfolioId, { autoBackfill: true });
            setStatus(`Imported ${summary.imported} row(s), skipped ${summary.duplicates} duplicate(s) from ${file.name}.`);
          } catch (error) {
            setStatus(`Import failed: ${error.message}`);
          } finally {
            setApiLoading(false);
          }
        }

              </div>
            </header>

            <section className="grid metrics" aria-label="Portfolio metrics">
              <div className="metric">
                <div className="label">Total value</div>
                <div className="value">{money(totalValue)}</div>
              </div>
              <div className="metric">
                <div className="label">Invested amount</div>
                <div className="value">{money(totalInvested)}</div>
              </div>
              <div className="metric">
                <div className="label">Unrealized gain</div>
                <div className={`value ${totalGain >= 0 ? "positive" : "negative"}`}>{money(totalGain)}</div>
              </div>
              <div className="metric">
                <div className="label">Return</div>
                <div className={`value ${totalGain >= 0 ? "positive" : "negative"}`}>{percent(totalGainPercent)}</div>
              </div>
            </section>

            <section className="grid workbench" style={{ marginTop: 14 }}>
              <div className="stack">
                <div className="panel">
                  <div className="toolbar">
                    <h2>Portfolio Performance</h2>
                    <div className="range-tabs" role="group" aria-label="Chart range">
                      {CHART_RANGES.map((range) => (
                        <button
                          key={range.key}
                          className={chartRange === range.key ? "active" : ""}
                          onClick={() => setChartRange(range.key)}
                        >
                          {range.label}
                        </button>
                      ))}
                    </div>
                  </div>
                  <LineChart data={history} visibleBenchmarks={visibleBenchmarks} />
                  <div className="legend">
                    <span className="key"><span className="dot" style={{ background: "#8090a5" }} />Invested</span>
                    <span className="key"><span className="dot" style={{ background: "#185fa5" }} />Value</span>
                    <label className="key">
                      <input
                        type="checkbox"
                        checked={visibleBenchmarks.sp500}
                        onChange={(event) => setVisibleBenchmarks((current) => ({ ...current, sp500: event.target.checked }))}
                      />
                      <span className="dot" style={{ background: "#1c8c5a" }} />S&P 500
                    </label>
                    <label className="key">
                      <input
                        type="checkbox"
                        checked={visibleBenchmarks.nasdaq100}
                        onChange={(event) => setVisibleBenchmarks((current) => ({ ...current, nasdaq100: event.target.checked }))}
                      />
                      <span className="dot" style={{ background: "#b45f06" }} />Nasdaq 100
                    </label>
                  </div>
                </div>

                {renderAnalyticsSection()}

                <div className="panel">
                  <div className="toolbar">
                    <h2>Holdings</h2>
                    <div className="actions">
                      <span className="subtitle">{holdings.length} open positions</span>
                      {apiAvailable && (
                        <button onClick={() => setMappingEditorOpen((open) => !open)}>
                          {mappingEditorOpen ? "Hide mappings" : "Edit mappings"}
                        </button>
                      )}
                    </div>
                  </div>
                  <div style={{ overflowX: "auto" }}>
                    <table>
                      <thead>
                        <tr>
                          <th>Ticker</th>
                          <th className="num">Qty</th>
                          <th className="num">Avg cost</th>
                          <th className="num">Market price</th>
                          <th className="num">Value</th>
                          <th className="num">Gain</th>
                          <th className="num">Allocation</th>
                          {apiAvailable && <th>Actions</th>}
                        </tr>
                      </thead>
                      <tbody>
                        {holdings.map((holding) => (
                          <tr key={holding.ticker}>
                            <td>
                              <strong>{holding.ticker}</strong>
                              {holding.name && <div className="holding-name">{holding.name}</div>}
                            </td>
                            <td className="num">{holding.quantity.toFixed(4)}</td>
                            <td className="num">{money(holding.averageCost)}</td>
                            <td className="num">
                              <input
                                type="text"
                                aria-label={`${holding.ticker} market price`}
                                value={prices[holding.ticker] ?? holding.currentPrice ?? ""}
                                onChange={(event) => updatePrice(holding.ticker, event.target.value)}
                                onBlur={(event) => saveMarketPrice(holding.ticker, event.target.value)}
                                style={{ maxWidth: 110, textAlign: "right" }}
                              />
                            </td>
                            <td className="num">{money(holding.value)}</td>
                            <td className={`num ${holding.gain >= 0 ? "positive" : "negative"}`}>{money(holding.gain)} ({percent(holding.gainPercent)})</td>
                            <td className="num">{holding.allocation.toFixed(1)}%</td>
                            {apiAvailable && (
                              <td>
                                <div className="actions">
                                  <button disabled={apiLoading} onClick={() => hideSecurity(holding.ticker)}>Hide</button>
                                  <button disabled={apiLoading} onClick={() => deleteSecurity(holding.ticker)}>Delete</button>
                                </div>
                              </td>
                            )}
                          </tr>
                        ))}
                        {!holdings.length && (
                          <tr>
                            <td colSpan={apiAvailable ? 8 : 7} className="mapping-note">No visible holdings.</td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                  {apiAvailable && hiddenSecurities.length > 0 && (
                    <div className="mapping-editor">
                      <div className="toolbar">
                        <h3>Hidden from tracking</h3>
                        <span className="subtitle">{hiddenSecurities.length} hidden</span>
                      </div>
                      <div className="hidden-list">
                        {hiddenSecurities.map((security) => (
                          <span className="hidden-item" key={security.ticker}>
                            <strong>{security.ticker}</strong>
                            <button disabled={apiLoading} onClick={() => restoreSecurity(security.ticker)}>Restore</button>
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                  {apiAvailable && mappingEditorOpen && renderMappingEditor()}
                </div>
              </div>

              <aside className="stack">
                <div className="panel">
                  <h2>Transactions</h2>
                  <div style={{ marginTop: 12 }}>
                    <label htmlFor="portfolio">Portfolio</label>
                    <select
                      id="portfolio"
                      value={selectedPortfolioId}
                      disabled={!apiAvailable || apiLoading}
                      onChange={(event) => setSelectedPortfolioId(event.target.value)}
                    >
                      {(portfolios.length ? portfolios : [{ id: "default", name: "Default Portfolio" }]).map((portfolio) => (
                        <option key={portfolio.id} value={portfolio.id}>{portfolio.name}</option>
                      ))}
                    </select>
                  </div>
                  {apiAvailable && (
                    <p className="status">{accounts.length ? `${accounts.length} account(s): ${accounts.map((account) => account.name).join(", ")}` : "No accounts yet for this portfolio."}</p>
                  )}
                  {renderManualTransactionForm()}
                  <div className="drop" style={{ marginTop: 12 }}>
                    <h3 style={{ marginBottom: 10 }}>Fortuneo CSV/ZIP</h3>
                    <label htmlFor="csv">CSV file</label>
                    <input className="file" id="csv" type="file" accept=".csv,.zip,text/csv,application/zip" disabled={apiLoading} onChange={importFile} />
                  </div>
                  {apiAvailable && importPreview && (
                    <div>
                      <div className="summary-row">
                        <div className="mini-stat">
                          <span className="label">Rows</span>
                          <strong>{importPreview.row_count}</strong>
                        </div>
                        <div className="mini-stat">
                          <span className="label">New</span>
                          <strong className="positive">{previewNewRows}</strong>
                        </div>
                        <div className="mini-stat">
                          <span className="label">Mappings</span>
                          <strong className={unresolvedMappingCount ? "warning" : ""}>{confirmedMappingGroups.length}/{mappingGroups.length}</strong>
                        </div>
                        <div className="mini-stat">
                          <span className="label">Duplicates</span>
                          <strong className="warning">{importPreview.duplicate_count}</strong>
                        </div>
                        <div className="mini-stat">
                          <span className="label">Errors</span>
                          <strong className={importPreview.error_count ? "negative" : ""}>{importPreview.error_count}</strong>
                        </div>
                      </div>
                      {previewOutcome && <div className="note preview-outcome">{previewOutcome}</div>}
                      {renderResolutionTasks()}
                      <div className="preview-table">
                        <table>
                          <thead>
                            <tr>
                              <th>Row</th>
                              <th>Status</th>
                              <th>Date</th>
                              <th>Ticker</th>
                              <th>Type</th>
                              <th className="num">Qty</th>
                              <th className="num">Price</th>
                              <th>Review</th>
                            </tr>
                          </thead>
                          <tbody>
                            {previewRows.map((row) => (
                              <tr key={row.row_number}>
                                <td>{row.row_number}</td>
                                <td><span className={`badge ${statusClass(row.status)}`}>{statusLabel(row.status)}</span></td>
                                <td>{row.transaction_date || "-"}</td>
                                <td><strong>{row.ticker || "-"}</strong></td>
                                <td>{row.transaction_type || "-"}</td>
                                <td className="num">{row.quantity ?? "-"}</td>
                                <td className="num">{row.price ?? "-"}</td>
                                <td className={`review-detail ${row.status === "invalid" ? "negative" : ""}`} title={row.error || row.security_label || row.description || row.account || ""}>
                                  {rowReviewDetail(row)}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      <div className="actions" style={{ marginTop: 12 }}>
                        <button className="primary" disabled={!canConfirmImport} onClick={confirmImport}>Confirm import</button>
                        <button disabled={apiLoading} onClick={clearImportPreview}>Clear</button>
                      </div>
                      {confirmImportDisabledReason && <p className="status">{confirmImportDisabledReason}</p>}
                    </div>
                  )}
                  <p className="status">{status}</p>
                </div>

                <div className="panel">
                  <div className="toolbar">
                    <h2>DCA Strategy</h2>
                    {apiAvailable && <button onClick={startNewDcaPlan}>New plan</button>}
                  </div>
                  {apiAvailable && (
                    <div style={{ marginBottom: 12 }}>
                      <label>Saved plan</label>
                      <select value={selectedDcaPlanId} onChange={(event) => selectDcaPlan(event.target.value)}>
                        <option value="">New unsaved plan</option>
                        {dcaPlans.map((plan) => (
                          <option key={plan.id} value={plan.id}>{plan.name}{plan.is_default ? " (default)" : ""}</option>
                        ))}
                      </select>
                    </div>
                  )}
                  <div className="controls" style={{ marginTop: 12 }}>
                    <div>
                      <label>Plan name</label>
                      <input type="text" value={dcaDraft.name} onChange={(event) => updateDcaDraft("name", event.target.value)} />
                    </div>
                    <div>
                      <label>Model</label>
                      <select value={dcaDraft.model_type} onChange={(event) => updateDcaDraft("model_type", event.target.value)}>
                        <option value="normal">Normal DCA</option>
                        <option value="enhanced">Enhanced DCA</option>
                      </select>
                    </div>
                    <div>
                      <label>Base amount</label>
                      <input type="number" value={dcaDraft.base_amount} min="0" step="50" onChange={(event) => updateDcaDraft("base_amount", Number(event.target.value))} />
                    </div>
                    <div>
                      <label>Frequency</label>
                      <select value={dcaDraft.contribution_frequency} onChange={(event) => updateDcaDraft("contribution_frequency", event.target.value)}>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                        <option value="quarterly">Quarterly</option>
                      </select>
                    </div>
                    <div>
                      <label>Benchmark</label>
                      <select value={dcaDraft.preferred_benchmark} disabled={dcaDraft.model_type !== "enhanced"} onChange={(event) => updateDcaDraft("preferred_benchmark", event.target.value)}>
                        <option value="^GSPC">S&P 500</option>
                        <option value="^NDX">Nasdaq 100</option>
                      </select>
                    </div>
                    <div>
                      <label>Market change %</label>
                      <input type="number" value={marketChange} step="0.1" disabled={dcaDraft.model_type !== "enhanced"} onChange={(event) => { setApiDca(null); setMarketChange(Number(event.target.value)); }} />
                    </div>
                    <div>
                      <label>Min multiplier</label>
                      <input type="number" value={dcaDraft.min_multiplier} min="0" step="0.1" disabled={dcaDraft.model_type !== "enhanced"} onChange={(event) => updateDcaDraft("min_multiplier", Number(event.target.value))} />
                    </div>
                    <div>
                      <label>Max multiplier</label>
                      <input type="number" value={dcaDraft.max_multiplier} min="0" step="0.1" disabled={dcaDraft.model_type !== "enhanced"} onChange={(event) => updateDcaDraft("max_multiplier", Number(event.target.value))} />
                    </div>
                    <div>
                      <label>VIX</label>
                      <input type="number" value={volatility} step="0.1" disabled={dcaDraft.model_type !== "enhanced"} onChange={(event) => { setApiDca(null); setVolatility(Number(event.target.value)); }} />
                    </div>
                  </div>
                  {apiAvailable && (
                    <div className="actions" style={{ marginTop: 12 }}>
                      <button onClick={saveDcaPlan}>Save plan</button>
                      <button className="primary" onClick={refreshDcaRecommendation}>Compute recommendation</button>
                    </div>
                  )}
                  {!apiAvailable && <p className="mapping-note" style={{ marginTop: 10 }}>Demo mode calculates locally and does not show saved backend plans.</p>}
                  <div className="recommendation">
                    <span className="label">Next investment amount</span>
                    <div className={`amount ${dca.adjusted > dcaBaseAmount ? "positive" : dca.adjusted < dcaBaseAmount ? "warning" : ""}`}>{money(dca.adjusted)}</div>
                    <div className="note">{dca.reason} Multiplier: {dca.multiplier.toFixed(2)}x.</div>
                    {dca.allocationSuggestions?.length > 0 && (
                      <div style={{ overflowX: "auto" }}>
                        <table>
                          <thead>
                            <tr>
                              <th>Ticker</th>
                              <th className="num">Suggested</th>
                              <th className="num">Target</th>
                              <th className="num">Current</th>
                            </tr>
                          </thead>
                          <tbody>
                            {dca.allocationSuggestions.map((suggestion) => (
                              <tr key={suggestion.ticker}>
                                <td><strong>{suggestion.ticker}</strong></td>
                                <td className="num">{money(toNumber(suggestion.suggested_amount))}</td>
                                <td className="num">{toNumber(suggestion.target_percent).toFixed(1)}%</td>
                                <td className="num">{toNumber(suggestion.current_percent).toFixed(1)}%</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                </div>

                <div className="panel">
                  <div className="toolbar">
                    <h2>Allocation</h2>
                  </div>
                  <AllocationBars holdings={holdings} />
                </div>
              </aside>
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
