<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enhanced DCA Investment Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg: #eef1f4;
        --surface: #ffffff;
        --surface-soft: #f7f8fa;
        --line: #d8dde5;
        --text: #182230;
        --muted: #627083;
        --blue: #185fa5;
        --green: #2f6b3f;
        --red: #a13b3b;
        --amber: #94630f;
        --ink: #243142;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        border-radius: 8px;
        min-height: 38px;
        padding: 0 12px;
        cursor: pointer;
      }

      button.primary {
        background: var(--ink);
        color: #ffffff;
        border-color: var(--ink);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      input[type="number"],
      input[type="text"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 38px;
        padding: 0 10px;
        background: var(--surface);
        color: var(--text);
      }

      .app {
        width: min(1380px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 26px;
        line-height: 1.2;
        font-weight: 650;
        letter-spacing: 0;
      }

      h2 {
        font-size: 16px;
        font-weight: 650;
      }

      .subtitle {
        color: var(--muted);
        margin-top: 4px;
        font-size: 14px;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .workbench {
        grid-template-columns: minmax(0, 1.4fr) minmax(320px, 0.8fr);
        align-items: start;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .metric {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 15px;
      }

      .metric .label,
      label {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 7px;
      }

      .metric .value {
        font-size: 24px;
        line-height: 1.2;
        font-weight: 650;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 14px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .status {
        min-height: 20px;
        color: var(--muted);
        font-size: 13px;
        margin-top: 10px;
      }

      .positive {
        color: var(--green);
      }

      .negative {
        color: var(--red);
      }

      .warning {
        color: var(--amber);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        padding: 10px 8px;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        text-align: left;
        font-weight: 600;
      }

      td.num,
      th.num {
        text-align: right;
      }

      .chart {
        height: 270px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-soft);
        overflow: hidden;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .legend {
        display: flex;
        gap: 14px;
        color: var(--muted);
        font-size: 12px;
        margin-top: 10px;
      }

      .key {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        display: inline-block;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .recommendation {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .amount {
        font-size: 34px;
        font-weight: 700;
        line-height: 1.1;
      }

      .note {
        background: #e7f0f8;
        color: #194c7d;
        border-radius: 8px;
        padding: 12px;
        font-size: 13px;
      }

      .drop {
        border: 1px dashed #aab4c1;
        background: var(--surface-soft);
        border-radius: 8px;
        padding: 12px;
      }

      .file {
        width: 100%;
      }

      @media (max-width: 920px) {
        .metrics,
        .workbench,
        .controls {
          grid-template-columns: 1fr;
        }

        .topbar,
        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useMemo, useState } = React;

      const sampleCsv = `Date operation;Operation;Code valeur;Quantite;Prix unitaire;Frais;Devise;Compte;Libelle
15/01/2026;Achat;CW8.PA;3;470,50;1,95;EUR;PEA;Amundi MSCI World
15/02/2026;Achat;CW8.PA;2;480,10;1,95;EUR;PEA;Amundi MSCI World
15/03/2026;Achat;EWLD.PA;8;32,60;1,95;EUR;PEA;Amundi World
20/04/2026;Vente;EWLD.PA;2;34,20;1,95;EUR;PEA;Rebalance`;

      const initialPrices = {
        "CW8.PA": 510.2,
        "EWLD.PA": 35.4,
        "PX1": 8050,
        "^GSPC": 5260,
      };

      function money(value) {
        return new Intl.NumberFormat("fr-FR", {
          style: "currency",
          currency: "EUR",
          maximumFractionDigits: 2,
        }).format(Number.isFinite(value) ? value : 0);
      }

      function percent(value) {
        return `${value >= 0 ? "+" : ""}${value.toFixed(2)}%`;
      }

      function parseNumber(value) {
        if (!value) return 0;
        const normalized = String(value).replace(/\s/g, "").replace(/\./g, "").replace(",", ".");
        return Number(normalized.replace(/[^0-9.-]/g, "")) || 0;
      }

      function splitCsvLine(line, delimiter) {
        const result = [];
        let current = "";
        let quoted = false;
        for (const char of line) {
          if (char === '"') quoted = !quoted;
          else if (char === delimiter && !quoted) {
            result.push(current);
            current = "";
          } else {
            current += char;
          }
        }
        result.push(current);
        return result.map((item) => item.trim());
      }

      function parseCsv(text) {
        const lines = text.split(/\r?\n/).filter((line) => line.trim());
        if (!lines.length) return [];
        const delimiter = lines[0].includes(";") ? ";" : ",";
        const headers = splitCsvLine(lines[0], delimiter).map((header) => header.toLowerCase());
        const indexOf = (...names) => headers.findIndex((header) => names.some((name) => header.includes(name)));
        const indexes = {
          date: indexOf("date"),
          type: indexOf("operation", "type", "sens"),
          ticker: indexOf("code valeur", "ticker", "symbol", "isin"),
          quantity: indexOf("quantite", "quantity", "shares", "qte"),
          price: indexOf("prix", "cours", "price"),
          fees: indexOf("frais", "fee", "commission"),
          currency: indexOf("devise", "currency"),
          account: indexOf("compte", "account"),
        };

        return lines.slice(1).map((line) => {
          const cells = splitCsvLine(line, delimiter);
          const rawType = (cells[indexes.type] || "").toLowerCase();
          const type = rawType.includes("vente") || rawType.includes("sell") ? "sell" : "buy";
          return {
            date: cells[indexes.date],
            type,
            ticker: (cells[indexes.ticker] || "").toUpperCase(),
            quantity: Math.abs(parseNumber(cells[indexes.quantity])),
            price: Math.abs(parseNumber(cells[indexes.price])),
            fees: Math.abs(parseNumber(cells[indexes.fees])),
            currency: cells[indexes.currency] || "EUR",
            account: cells[indexes.account] || "",
          };
        }).filter((row) => row.ticker && row.quantity > 0);
      }

      function buildHoldings(transactions, prices) {
        const lots = {};
        transactions.forEach((transaction) => {
          const key = transaction.ticker;
          lots[key] ||= { ticker: key, quantity: 0, cost: 0, currency: transaction.currency };
          if (transaction.type === "buy") {
            lots[key].quantity += transaction.quantity;
            lots[key].cost += transaction.quantity * transaction.price + transaction.fees;
          } else if (transaction.type === "sell" && lots[key].quantity > 0) {
            const sold = Math.min(transaction.quantity, lots[key].quantity);
            const avg = lots[key].cost / lots[key].quantity;
            lots[key].quantity -= sold;
            lots[key].cost -= avg * sold;
          }
        });

        const openLots = Object.values(lots).filter((lot) => lot.quantity > 0.0001);
        const totalValue = openLots.reduce((sum, lot) => sum + lot.quantity * (prices[lot.ticker] || lot.cost / lot.quantity), 0);
        return openLots.map((lot) => {
          const averageCost = lot.cost / lot.quantity;
          const currentPrice = prices[lot.ticker] || averageCost;
          const value = lot.quantity * currentPrice;
          const gain = value - lot.cost;
          return {
            ...lot,
            averageCost,
            currentPrice,
            value,
            gain,
            gainPercent: lot.cost ? (gain / lot.cost) * 100 : 0,
            allocation: totalValue ? (value / totalValue) * 100 : 0,
          };
        }).sort((a, b) => b.value - a.value);
      }

      function calculateDca(baseAmount, marketChange, volatility) {
        let multiplier = 1;
        if (marketChange <= -5) multiplier = 1.5;
        else if (marketChange <= -3) multiplier = 1.3;
        else if (marketChange <= -1) multiplier = 1.2;
        else if (marketChange >= 5) multiplier = 0.7;
        else if (marketChange >= 3) multiplier = 0.8;

        if (volatility >= 30 && multiplier > 1) multiplier += 0.1;
        if (volatility <= 14 && multiplier > 1) multiplier -= 0.1;

        const adjusted = Math.round(baseAmount * multiplier);
        const action = multiplier > 1 ? "Increase" : multiplier < 1 ? "Decrease" : "Keep";
        const move = marketChange < 0 ? `market is down ${Math.abs(marketChange).toFixed(1)}%` : `market is up ${marketChange.toFixed(1)}%`;
        const reason = `${action} the next contribution because the ${move}${volatility >= 30 ? " and volatility is elevated" : ""}.`;
        return { adjusted, multiplier, reason };
      }

      function LineChart({ data }) {
        const width = 820;
        const height = 270;
        const pad = 34;
        const max = Math.max(...data.flatMap((item) => [item.invested, item.value]), 1);
        const min = Math.min(...data.flatMap((item) => [item.invested, item.value]), 0);
        const x = (index) => pad + (index / Math.max(data.length - 1, 1)) * (width - pad * 2);
        const y = (value) => height - pad - ((value - min) / (max - min || 1)) * (height - pad * 2);
        const path = (key) => data.map((item, index) => `${index === 0 ? "M" : "L"}${x(index)},${y(item[key])}`).join(" ");

        return (
          <div className="chart">
            <svg viewBox={`0 0 ${width} ${height}`} role="img" aria-label="Portfolio performance chart">
              {[0, 1, 2, 3].map((line) => {
                const yy = pad + line * ((height - pad * 2) / 3);
                return <line key={line} x1={pad} y1={yy} x2={width - pad} y2={yy} stroke="#d8dde5" />;
              })}
              <path d={path("invested")} fill="none" stroke="#8090a5" strokeWidth="3" />
              <path d={path("value")} fill="none" stroke="#185fa5" strokeWidth="3" />
              {data.map((item, index) => (
                <text key={item.month} x={x(index)} y={height - 10} textAnchor="middle" fontSize="11" fill="#627083">{item.month}</text>
              ))}
            </svg>
          </div>
        );
      }

      function AllocationBars({ holdings }) {
        return (
          <div className="stack">
            {holdings.map((holding) => (
              <div key={holding.ticker}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 5 }}>
                  <strong>{holding.ticker}</strong>
                  <span>{holding.allocation.toFixed(1)}%</span>
                </div>
                <div style={{ height: 9, borderRadius: 99, background: "#edf0f4", overflow: "hidden" }}>
                  <div style={{ width: `${Math.min(holding.allocation, 100)}%`, height: "100%", background: "#185fa5" }} />
                </div>
              </div>
            ))}
          </div>
        );
      }

      function App() {
        const [transactions, setTransactions] = useState(() => parseCsv(sampleCsv));
        const [prices, setPrices] = useState(initialPrices);
        const [baseAmount, setBaseAmount] = useState(1000);
        const [marketChange, setMarketChange] = useState(-2.3);
        const [volatility, setVolatility] = useState(18.5);
        const [status, setStatus] = useState("Demo data loaded. Import a Fortuneo CSV when ready.");

        const holdings = useMemo(() => buildHoldings(transactions, prices), [transactions, prices]);
        const totalValue = holdings.reduce((sum, holding) => sum + holding.value, 0);
        const totalInvested = holdings.reduce((sum, holding) => sum + holding.cost, 0);
        const totalGain = totalValue - totalInvested;
        const totalGainPercent = totalInvested ? (totalGain / totalInvested) * 100 : 0;
        const dca = calculateDca(baseAmount, marketChange, volatility);

        const history = useMemo(() => {
          const months = ["Jan", "Feb", "Mar", "Apr", "May", "Now"];
          return months.map((month, index) => {
            const ratio = (index + 1) / months.length;
            return {
              month,
              invested: totalInvested * ratio,
              value: totalInvested * ratio + totalGain * Math.pow(ratio, 1.3),
            };
          });
        }, [totalInvested, totalGain]);

        async function importFile(event) {
          const file = event.target.files?.[0];
          if (!file) return;
          const text = await file.text();
          const parsed = parseCsv(text);
          setTransactions(parsed);
          setStatus(`Imported ${parsed.length} transaction rows from ${file.name}.`);
        }

        function updatePrice(ticker, value) {
          setPrices((current) => ({ ...current, [ticker]: parseNumber(value) }));
        }

        function simulateMarket() {
          const next = Number((Math.random() * 10 - 5).toFixed(1));
          setMarketChange(next);
          setVolatility(Number((15 + Math.random() * 18).toFixed(1)));
        }

        return (
          <main className="app">
            <header className="topbar">
              <div>
                <h1>Enhanced DCA Investment Tracker</h1>
                <p className="subtitle">Portfolio import, performance tracking, market context, and next contribution sizing.</p>
              </div>
              <div className="actions">
                <button onClick={() => { setTransactions(parseCsv(sampleCsv)); setStatus("Demo data restored."); }}>Demo data</button>
                <button className="primary" onClick={simulateMarket}>Refresh market simulation</button>
              </div>
            </header>

            <section className="grid metrics" aria-label="Portfolio metrics">
              <div className="metric">
                <div className="label">Total value</div>
                <div className="value">{money(totalValue)}</div>
              </div>
              <div className="metric">
                <div className="label">Invested amount</div>
                <div className="value">{money(totalInvested)}</div>
              </div>
              <div className="metric">
                <div className="label">Unrealized gain</div>
                <div className={`value ${totalGain >= 0 ? "positive" : "negative"}`}>{money(totalGain)}</div>
              </div>
              <div className="metric">
                <div className="label">Return</div>
                <div className={`value ${totalGain >= 0 ? "positive" : "negative"}`}>{percent(totalGainPercent)}</div>
              </div>
            </section>

            <section className="grid workbench" style={{ marginTop: 14 }}>
              <div className="stack">
                <div className="panel">
                  <div className="toolbar">
                    <h2>Portfolio Performance</h2>
                    <div className="legend">
                      <span className="key"><span className="dot" style={{ background: "#8090a5" }} />Invested</span>
                      <span className="key"><span className="dot" style={{ background: "#185fa5" }} />Value</span>
                    </div>
                  </div>
                  <LineChart data={history} />
                </div>

                <div className="panel">
                  <div className="toolbar">
                    <h2>Holdings</h2>
                    <span className="subtitle">{holdings.length} open positions</span>
                  </div>
                  <div style={{ overflowX: "auto" }}>
                    <table>
                      <thead>
                        <tr>
                          <th>Ticker</th>
                          <th className="num">Qty</th>
                          <th className="num">Avg cost</th>
                          <th className="num">Market price</th>
                          <th className="num">Value</th>
                          <th className="num">Gain</th>
                          <th className="num">Allocation</th>
                        </tr>
                      </thead>
                      <tbody>
                        {holdings.map((holding) => (
                          <tr key={holding.ticker}>
                            <td><strong>{holding.ticker}</strong></td>
                            <td className="num">{holding.quantity.toFixed(4)}</td>
                            <td className="num">{money(holding.averageCost)}</td>
                            <td className="num">
                              <input
                                type="text"
                                aria-label={`${holding.ticker} market price`}
                                value={prices[holding.ticker] ?? ""}
                                onChange={(event) => updatePrice(holding.ticker, event.target.value)}
                                style={{ maxWidth: 110, textAlign: "right" }}
                              />
                            </td>
                            <td className="num">{money(holding.value)}</td>
                            <td className={`num ${holding.gain >= 0 ? "positive" : "negative"}`}>{money(holding.gain)} ({percent(holding.gainPercent)})</td>
                            <td className="num">{holding.allocation.toFixed(1)}%</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>

              <aside className="stack">
                <div className="panel">
                  <h2>Fortuneo Import</h2>
                  <div className="drop" style={{ marginTop: 12 }}>
                    <label htmlFor="csv">CSV file</label>
                    <input className="file" id="csv" type="file" accept=".csv,text/csv" onChange={importFile} />
                  </div>
                  <p className="status">{status}</p>
                </div>

                <div className="panel">
                  <h2>Enhanced DCA</h2>
                  <div className="controls" style={{ marginTop: 12 }}>
                    <div>
                      <label>Base amount</label>
                      <input type="number" value={baseAmount} min="0" step="50" onChange={(event) => setBaseAmount(Number(event.target.value))} />
                    </div>
                    <div>
                      <label>Market change %</label>
                      <input type="number" value={marketChange} step="0.1" onChange={(event) => setMarketChange(Number(event.target.value))} />
                    </div>
                    <div>
                      <label>VIX</label>
                      <input type="number" value={volatility} step="0.1" onChange={(event) => setVolatility(Number(event.target.value))} />
                    </div>
                  </div>
                  <div className="recommendation">
                    <span className="label">Next investment amount</span>
                    <div className={`amount ${dca.adjusted > baseAmount ? "positive" : dca.adjusted < baseAmount ? "warning" : ""}`}>{money(dca.adjusted)}</div>
                    <div className="note">{dca.reason} Multiplier: {dca.multiplier.toFixed(2)}x.</div>
                  </div>
                </div>

                <div className="panel">
                  <div className="toolbar">
                    <h2>Allocation</h2>
                  </div>
                  <AllocationBars holdings={holdings} />
                </div>
              </aside>
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
