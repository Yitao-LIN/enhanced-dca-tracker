<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enhanced DCA Investment Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg: #eef1f4;
        --surface: #ffffff;
        --surface-soft: #f7f8fa;
        --line: #d8dde5;
        --text: #182230;
        --muted: #627083;
        --blue: #185fa5;
        --green: #2f6b3f;
        --red: #a13b3b;
        --amber: #94630f;
        --ink: #243142;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        border-radius: 8px;
        min-height: 38px;
        padding: 0 12px;
        cursor: pointer;
      }

      button.primary {
        background: var(--ink);
        color: #ffffff;
        border-color: var(--ink);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      input[type="number"],
      input[type="text"],
      input[type="date"],
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 38px;
        padding: 0 10px;
        background: var(--surface);
        color: var(--text);
      }

      textarea {
        min-height: 74px;
        padding: 9px 10px;
        resize: vertical;
      }

      .app {
        width: min(1380px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 26px;
        line-height: 1.2;
        font-weight: 650;
        letter-spacing: 0;
      }

      h2 {
        font-size: 16px;
        font-weight: 650;
      }

      h3 {
        font-size: 14px;
        font-weight: 650;
      }

      .subtitle {
        color: var(--muted);
        margin-top: 4px;
        font-size: 14px;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .workbench {
        grid-template-columns: minmax(0, 1.4fr) minmax(320px, 0.8fr);
        align-items: start;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .metric {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 15px;
      }

      .metric .label,
      label {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 7px;
      }

      .metric .value {
        font-size: 24px;
        line-height: 1.2;
        font-weight: 650;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 14px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .manual-form {
        display: grid;
        gap: 12px;
        margin-top: 12px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--line);
      }

      .manual-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .manual-grid .full {
        grid-column: 1 / -1;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .status {
        min-height: 20px;
        color: var(--muted);
        font-size: 13px;
        margin-top: 10px;
      }

      .positive {
        color: var(--green);
      }

      .negative {
        color: var(--red);
      }

      .warning {
        color: var(--amber);
      }

      .summary-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .analytics-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
        gap: 14px;
        align-items: start;
      }

      .analytics-table {
        min-width: 820px;
      }

      .target-input {
        max-width: 92px;
        text-align: right;
      }

      .target-add {
        display: grid;
        grid-template-columns: minmax(110px, 1fr) minmax(100px, 0.7fr) auto;
        gap: 8px;
        align-items: end;
        margin-top: 12px;
      }

      .drift-list {
        display: grid;
        gap: 10px;
      }

      .drift-row {
        display: grid;
        gap: 6px;
      }

      .drift-header {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
      }

      .drift-track {
        position: relative;
        height: 11px;
        border-radius: 999px;
        background: #edf0f4;
        overflow: hidden;
      }

      .drift-fill {
        position: absolute;
        inset: 0 auto 0 0;
        border-radius: inherit;
        background: var(--blue);
      }

      .target-marker {
        position: absolute;
        top: -2px;
        bottom: -2px;
        width: 3px;
        border-radius: 999px;
        background: var(--amber);
      }

      .activity-list,
      .benchmark-list {
        display: grid;
        gap: 8px;
      }

      .activity-item,
      .benchmark-item {
        display: grid;
        gap: 5px;
        border-top: 1px solid var(--line);
        padding-top: 9px;
        font-size: 13px;
      }

      .activity-item:first-child,
      .benchmark-item:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .activity-values,
      .benchmark-values {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .mini-stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px;
        background: var(--surface-soft);
      }

      .mini-stat strong {
        display: block;
        font-size: 16px;
        line-height: 1.2;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 0 8px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .badge.new {
        border-color: rgba(47, 107, 63, 0.25);
        background: #eef7f0;
        color: var(--green);
      }

      .badge.duplicate {
        border-color: rgba(148, 99, 15, 0.25);
        background: #fff7e8;
        color: var(--amber);
      }

      .badge.invalid {
        border-color: rgba(161, 59, 59, 0.25);
        background: #fff0f0;
        color: var(--red);
      }

      .badge.mapping {
        border-color: rgba(24, 95, 165, 0.25);
        background: #edf5fc;
        color: var(--blue);
      }

      .preview-table {
        max-height: 320px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        margin-top: 12px;
      }

      .preview-table table {
        min-width: 760px;
      }

      .review-detail {
        min-width: 190px;
        white-space: normal;
      }

      .preview-outcome {
        margin-top: 12px;
      }

      .resolution-tasks {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .task-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: var(--surface-soft);
      }

      .task-card.invalid {
        border-color: rgba(161, 59, 59, 0.32);
        background: #fff7f7;
      }

      .task-header {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }

      .task-title {
        min-width: 0;
      }

      .task-title strong {
        display: block;
        overflow-wrap: anywhere;
      }

      .row-list {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }

      .mapping-controls {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) auto;
        gap: 6px;
        align-items: center;
        margin-top: 10px;
      }

      .mapping-search {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) auto;
        gap: 6px;
        align-items: center;
        margin-top: 8px;
      }

      .mapping-note {
        color: var(--muted);
        font-size: 12px;
        margin-top: 6px;
      }

      .suggestion-list {
        display: grid;
        gap: 6px;
        margin-top: 8px;
      }

      .suggestion-row {
        display: grid;
        grid-template-columns: minmax(70px, auto) minmax(0, 1fr) minmax(100px, auto) auto;
        gap: 8px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px;
        background: var(--surface-soft);
        font-size: 12px;

      .suggestion-row span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .suggestion-source {
        grid-column: 2 / 4;
        color: var(--muted);
        font-size: 11px;
      }

      .holding-name {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.25;
        max-width: 240px;
        overflow-wrap: anywhere;
      }

      .mapping-editor {
        border-top: 1px solid var(--line);
        margin-top: 14px;
        padding-top: 14px;
      }

      .mapping-editor table {
        min-width: 760px;
      }

      .mapping-editor input {
        min-width: 130px;
      }

      .mapping-editor .actions {
        flex-wrap: nowrap;
      }

      .hidden-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .hidden-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 6px 8px;
        background: var(--surface-soft);
        font-size: 12px;
      }

      .hidden-item button {
        min-height: 28px;
        padding: 0 8px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        padding: 10px 8px;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        text-align: left;
        font-weight: 600;
      }

      td.num,
      th.num {
        text-align: right;
      }

      .chart {
        position: relative;
        height: 270px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-soft);
        overflow: hidden;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        color: var(--muted);
        font-size: 12px;
        margin-top: 10px;
      }

      .key {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .key input {
        margin: 0;
      }

      .range-tabs {
        display: inline-flex;
        gap: 4px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-soft);
      }

      .range-tabs button {
        min-height: 30px;
        border-color: transparent;
        background: transparent;
        padding: 0 9px;
      }

      .range-tabs button.active {
        border-color: var(--line);
        background: var(--surface);
        color: var(--blue);
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        display: inline-block;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .recommendation {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .amount {
        font-size: 34px;
        font-weight: 700;
        line-height: 1.1;
      }

      .note {
        background: #e7f0f8;
        color: #194c7d;
        border-radius: 8px;
        padding: 12px;
        font-size: 13px;
      }

      .drop {
        border: 1px dashed #aab4c1;
        background: var(--surface-soft);
        border-radius: 8px;
        padding: 12px;
      }

      .file {
        width: 100%;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 10px;
        color: var(--muted);
        font-size: 12px;
        background: var(--surface);
      }

      @media (max-width: 920px) {
        .metrics,
        .workbench,
        .analytics-layout,
        .controls,
        .manual-grid,
        .summary-row {
          grid-template-columns: 1fr;
        }

        .target-add {
          grid-template-columns: 1fr;
        }

        .topbar,
        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      /**
       * @file
       * @brief Standalone React dashboard for local portfolio tracking and backend sync.
       */
      const { useEffect, useMemo, useState } = React;
      const API_BASE_URL = localStorage.getItem("trackerApiBaseUrl") || "http://127.0.0.1:8000";
      const BENCHMARK_SYMBOLS = ["^GSPC", "^NDX"];
      const CHART_RANGES = [
        { key: "1d", label: "1D", days: 1, intraday: true, interval: "30m" },
        { key: "5d", label: "5D", days: 5, intraday: true, interval: "1h" },
        { key: "30d", label: "30D", days: 30 },
        { key: "1y", label: "1Y", yearStart: true },
        { key: "all", label: "Since start", days: null },
      ];

      const sampleCsv = `Date operation;Operation;Code valeur;Quantite;Prix unitaire;Frais;Devise;Compte;Libelle
15/01/2026;Achat;CW8.PA;3;470,50;1,95;EUR;PEA;Amundi MSCI World
15/02/2026;Achat;CW8.PA;2;480,10;1,95;EUR;PEA;Amundi MSCI World
15/03/2026;Achat;EWLD.PA;8;32,60;1,95;EUR;PEA;Amundi World
20/04/2026;Vente;EWLD.PA;2;34,20;1,95;EUR;PEA;Rebalance`;

      const initialPrices = {
        "CW8.PA": 510.2,
        "EWLD.PA": 35.4,
        "PX1": 8050,
        "^GSPC": 5260,
      };

      const emptyApiSummary = {
        total_value: 0,
        total_invested: 0,
        total_gain: 0,
        total_gain_percent: 0,
        holdings: [],
      };

      const emptyPortfolioAnalytics = {
        total_value: 0,
        total_target_percent: 0,
        unassigned_target_percent: 100,
        allocation_drift: [],
        monthly_activity: [],
        benchmark_comparison: [],
      };

      /** @brief Format a numeric EUR value for compact dashboard display. */
      function money(value) {
        return new Intl.NumberFormat("fr-FR", {
          style: "currency",
          currency: "EUR",
          maximumFractionDigits: 2,
        }).format(Number.isFinite(value) ? value : 0);
      }

      function percent(value) {
        return `${value >= 0 ? "+" : ""}${value.toFixed(2)}%`;
      }

      /** @brief Parse French or English decimal strings without losing dot-decimal prices. */
      function parseNumber(value) {
        if (!value) return 0;
        let normalized = String(value).trim().replace(/\s/g, "").replace(/[^0-9,.-]/g, "");
        const lastComma = normalized.lastIndexOf(",");
        const lastDot = normalized.lastIndexOf(".");
        if (lastComma >= 0 && lastDot >= 0) {
          const decimalSeparator = lastComma > lastDot ? "," : ".";
          const groupSeparator = decimalSeparator === "," ? "." : ",";
          normalized = normalized.replaceAll(groupSeparator, "").replace(decimalSeparator, ".");
        } else if (lastComma >= 0) {
          normalized = normalized.replace(",", ".");
        }
        return Number(normalized.replace(/[^0-9.-]/g, "")) || 0;
      }

      function toNumber(value) {
        const number = Number(value);
        return Number.isFinite(number) ? number : 0;
      }

      function isoDate(date) {
        return date.toISOString().slice(0, 10);
      }

      function chartRangeConfig(rangeKey) {
        return CHART_RANGES.find((item) => item.key === rangeKey) || CHART_RANGES[3];
      }

      function isIntradayRange(rangeKey) {
        return Boolean(chartRangeConfig(rangeKey).intraday);
      }

      /** @brief Build daily-history query dates for the selected chart range. */
      function chartDateRange(rangeKey) {
        const end = new Date();
        const range = chartRangeConfig(rangeKey);
        const params = { end_date: isoDate(end) };
        if (range.yearStart) {
          params.start_date = isoDate(new Date(end.getFullYear(), 0, 1));
        } else if (range.days !== null) {
          const start = new Date(end);
          start.setDate(start.getDate() - range.days);
          params.start_date = isoDate(start);
        }
        return params;
      }

      /** @brief Build intraday-history query timestamps for short chart ranges. */
      function chartDateTimeRange(rangeKey) {
        const end = new Date();
        const range = chartRangeConfig(rangeKey);
        const start = new Date(end);
        start.setDate(start.getDate() - (range.days || 1));
        return {
          start_at: start.toISOString(),
          end_at: end.toISOString(),
          interval: range.interval || "30m",
        };
      }

      function queryString(params) {
        return Object.entries(params)
          .filter(([, value]) => value !== undefined && value !== null && value !== "")
          .map(([key, value]) => `${encodeURIComponent(key)}=${encodeURIComponent(value)}`)
          .join("&");
      }

      /** @brief Fetch JSON from the FastAPI backend and surface readable error messages. */
      async function apiRequest(path, options = {}) {
        let response;
        try {
          response = await fetch(`${API_BASE_URL}${path}`, options);
        } catch (error) {
          throw new Error(
            `Backend request failed before a response from ${API_BASE_URL}${path}. ` +
            `Check that FastAPI is running, then click Sync API. Browser error: ${error.message}`
          );
        }
        if (!response.ok) {
          const message = await response.text();
          throw new Error(message || `API request failed with ${response.status}`);
        }
        return response.json();
      }

      function splitCsvLine(line, delimiter) {
        const result = [];
        let current = "";
        let quoted = false;
        for (const char of line) {
          if (char === '"') quoted = !quoted;
          else if (char === delimiter && !quoted) {
            result.push(current);
            current = "";
          } else {
            current += char;
          }
        }
        result.push(current);
        return result.map((item) => item.trim());
      }

      /** @brief Parse the local demo CSV path when the backend is unavailable. */
      function parseCsv(text) {
        const lines = text.split(/\r?\n/).filter((line) => line.trim());
        if (!lines.length) return [];
        const delimiter = lines[0].includes(";") ? ";" : ",";
        const headers = splitCsvLine(lines[0], delimiter).map((header) => header.toLowerCase());
        const indexOf = (...names) => headers.findIndex((header) => names.some((name) => header.includes(name)));
        const indexes = {
          date: indexOf("date"),
          type: indexOf("operation", "type", "sens"),
          ticker: indexOf("code valeur", "ticker", "symbol", "isin"),
          quantity: indexOf("quantite", "quantity", "shares", "qte"),
          price: indexOf("prix", "cours", "price"),
          fees: indexOf("frais", "fee", "commission"),
          currency: indexOf("devise", "currency"),
          account: indexOf("compte", "account"),
        };

        return lines.slice(1).map((line) => {
          const cells = splitCsvLine(line, delimiter);
          const rawType = (cells[indexes.type] || "").toLowerCase();
          const type = rawType.includes("vente") || rawType.includes("sell") ? "sell" : "buy";
          return {
            date: cells[indexes.date],
            type,
            ticker: (cells[indexes.ticker] || "").toUpperCase(),
            quantity: Math.abs(parseNumber(cells[indexes.quantity])),
            price: Math.abs(parseNumber(cells[indexes.price])),
            fees: Math.abs(parseNumber(cells[indexes.fees])),
            currency: cells[indexes.currency] || "EUR",
            account: cells[indexes.account] || "",
          };
        }).filter((row) => row.ticker && row.quantity > 0);
      }

      /** @brief Mirror the backend average-cost holding calculation for demo mode. */
      function buildHoldings(transactions, prices) {
        const lots = {};
        transactions.forEach((transaction) => {
          const key = transaction.ticker;
          lots[key] ||= { ticker: key, quantity: 0, cost: 0, currency: transaction.currency };
          if (transaction.type === "buy") {
            lots[key].quantity += transaction.quantity;
            lots[key].cost += transaction.quantity * transaction.price + transaction.fees;
          } else if (transaction.type === "sell" && lots[key].quantity > 0) {
            // Demo mode mirrors backend average-cost reduction after a sell.
            const sold = Math.min(transaction.quantity, lots[key].quantity);
            const avg = lots[key].cost / lots[key].quantity;
            lots[key].quantity -= sold;
            lots[key].cost -= avg * sold;
          }
        });

        const openLots = Object.values(lots).filter((lot) => lot.quantity > 0.0001);
        const totalValue = openLots.reduce((sum, lot) => sum + lot.quantity * (prices[lot.ticker] || lot.cost / lot.quantity), 0);
        return openLots.map((lot) => {
          const averageCost = lot.cost / lot.quantity;
          const currentPrice = prices[lot.ticker] || averageCost;
          const value = lot.quantity * currentPrice;
          const gain = value - lot.cost;
          return {
            ...lot,
            averageCost,
            currentPrice,
            value,
            gain,
            gainPercent: lot.cost ? (gain / lot.cost) * 100 : 0,
            allocation: totalValue ? (value / totalValue) * 100 : 0,
          };
        }).sort((a, b) => b.value - a.value);
      }

      function holdingsFromApi(summary) {
        return (summary.holdings || []).map((holding) => ({
          ticker: holding.ticker,
          name: holding.name || "",
          quantity: toNumber(holding.quantity),
          cost: toNumber(holding.invested_amount),
          averageCost: toNumber(holding.average_cost),
          currentPrice: toNumber(holding.current_price),
          value: toNumber(holding.market_value),
          gain: toNumber(holding.unrealized_gain),
          gainPercent: toNumber(holding.unrealized_gain_percent),
          allocation: toNumber(holding.allocation_percent),
          currency: holding.currency || "EUR",
        }));
      }

      /** @brief Build read-only allocation analytics for offline demo mode. */
      function demoAllocationRows(holdings) {
        return holdings.map((holding) => ({
          ticker: holding.ticker,
          name: holding.name || "",
          currentValue: holding.value,
          currentPercent: holding.allocation,
          targetPercent: null,
          targetValue: null,
          driftPercent: null,
          driftValue: null,
          buyValue: 0,
          trimValue: 0,
          action: "current",
        }));
      }

      /** @brief Convert API analytics rows from Decimal strings to display numbers. */
      function analyticsRowsFromApi(analytics) {
        return (analytics.allocation_drift || []).map((row) => ({
          ticker: row.ticker,
          name: row.name || "",
          currentValue: toNumber(row.current_value),
          currentPercent: toNumber(row.current_percent),
          targetPercent: row.target_percent === null || row.target_percent === undefined ? null : toNumber(row.target_percent),
          targetValue: row.target_value === null || row.target_value === undefined ? null : toNumber(row.target_value),
          driftPercent: row.drift_percent === null || row.drift_percent === undefined ? null : toNumber(row.drift_percent),
          driftValue: row.drift_value === null || row.drift_value === undefined ? null : toNumber(row.drift_value),
          buyValue: toNumber(row.buy_value),
          trimValue: toNumber(row.trim_value),
          action: row.action || "unassigned",
        }));
      }

      /** @brief Seed editable target drafts from saved targets and visible analytics rows. */
      function targetDraftsFromRows(targetRows, analyticsRows = []) {
        const drafts = {};
        analyticsRows.forEach((row) => {
          drafts[row.ticker] = row.target_percent === null || row.target_percent === undefined ? "" : String(toNumber(row.target_percent));
        });
        targetRows.forEach((row) => {
          drafts[row.ticker] = String(toNumber(row.target_percent));
        });
        return drafts;
      }

      /** @brief Convert editable target draft state into the bulk API payload. */
      function targetPayloadFromDrafts(drafts, newTarget) {
        const targets = new Map();
        Object.entries(drafts).forEach(([ticker, rawPercent]) => {
          const symbol = String(ticker || "").trim().toUpperCase();
          const raw = String(rawPercent ?? "").trim();
          if (!symbol || raw === "") return;
          const targetPercent = Number(raw);
          if (!Number.isFinite(targetPercent)) throw new Error(`Invalid target percent for ${symbol}.`);
          targets.set(symbol, { ticker: symbol, target_percent: targetPercent });
        });
        const newSymbol = String(newTarget.ticker || "").trim().toUpperCase();
        const newRaw = String(newTarget.target_percent ?? "").trim();
        if (newSymbol || newRaw) {
          const targetPercent = Number(newRaw);
          if (!newSymbol) throw new Error("Ticker is required.");
          if (!Number.isFinite(targetPercent)) throw new Error(`Invalid target percent for ${newSymbol}.`);
          targets.set(newSymbol, { ticker: newSymbol, target_percent: targetPercent });
        }
        return Array.from(targets.values()).sort((a, b) => a.ticker.localeCompare(b.ticker));
      }

      /** @brief Render backend allocation action codes as compact labels. */
      function actionLabel(action) {
        return {
          buy: "Buy",
          trim: "Trim",
          hold: "Hold",
          unassigned: "Unassigned",
          current: "Current",
        }[action] || action;
      }

      /** @brief Format a EUR value with an explicit positive sign. */
      function signedMoney(value) {
        return `${value >= 0 ? "+" : ""}${money(value)}`;
      }

      /** @brief Build the editable draft for one backend-persisted manual transaction. */
      function defaultManualTransactionDraft() {
        return {
          transaction_date: isoDate(new Date()),
          transaction_type: "buy",
          ticker: "",
          quantity: "",
          price: "",
          amount: "",

        };

      /** @brief Build the local draft for a new unsaved DCA plan. */
      function defaultDcaDraft(portfolioId = "default") {
        return {
          portfolio_id: portfolioId,
          name: "Monthly normal",
          model_type: "normal",

      /** @brief Convert a backend DCA plan response into editable component state. */
      function dcaDraftFromPlan(plan, portfolioId = "default") {
        if (!plan) return defaultDcaDraft(portfolioId);
        return {
          portfolio_id: plan.portfolio_id || portfolioId,
          name: plan.name || "Monthly normal",

          contribution_frequency: plan.contribution_frequency || "monthly",
          is_default: Boolean(plan.is_default),
        };
      }

      /** @brief Convert editable DCA state into the plan create/update payload. */
      function dcaPlanPayload(draft, portfolioId) {
        return {
          portfolio_id: portfolioId,
          name: String(draft.name || "").trim(),
          model_type: draft.model_type,
          base_amount: Number(draft.base_amount) || 0,
          preferred_benchmark: String(draft.preferred_benchmark || "^GSPC").trim().toUpperCase(),
          min_multiplier: Number(draft.min_multiplier) || 0.7,
          max_multiplier: Number(draft.max_multiplier) || 1.5,
          contribution_frequency: String(draft.contribution_frequency || "monthly").trim().toLowerCase(),
          is_default: Boolean(draft.is_default),
        };
      }

      /** @brief Mirror backend Normal and Enhanced DCA rules when running in demo mode. */
      function calculateDca(modelType, baseAmount, marketChange, volatility) {
        if (modelType === "normal") {
          return {
            adjusted: Math.round(baseAmount),
            multiplier: 1,
            reason: "Keep contribution because this Normal DCA plan uses a fixed amount.",
            allocationSuggestions: [],
          };
        }
        let multiplier = 1;
        if (marketChange <= -5) multiplier = 1.5;
        else if (marketChange <= -3) multiplier = 1.3;
        else if (marketChange <= -1) multiplier = 1.2;
        else if (marketChange >= 5) multiplier = 0.7;
        else if (marketChange >= 3) multiplier = 0.8;

        if (volatility >= 30 && multiplier > 1) multiplier += 0.1;
        if (volatility <= 14 && multiplier > 1) multiplier -= 0.1;

        const adjusted = Math.round(baseAmount * multiplier);
        const action = multiplier > 1 ? "Increase" : multiplier < 1 ? "Decrease" : "Keep";
        const move = marketChange < 0 ? `market is down ${Math.abs(marketChange).toFixed(1)}%` : `market is up ${marketChange.toFixed(1)}%`;
        const reason = `${action} the next contribution because the ${move}${volatility >= 30 ? " and volatility is elevated" : ""}.`;
        return { adjusted, multiplier, reason, allocationSuggestions: [] };
      }

      function statusLabel(status) {
        const labels = {
          new: "New",
          duplicate_in_file: "Duplicate",
          duplicate_existing: "Existing",
          invalid: "Invalid",
          needs_mapping: "Map",
        };
        return labels[status] || status;
      }

      function statusClass(status) {
        if (status === "new") return "new";
        if (status === "invalid") return "invalid";
        if (status === "needs_mapping") return "mapping";
        if (status && status.startsWith("duplicate")) return "duplicate";
        return "";
      }

      function chartDate(value) {
        if (!value) return null;
        const text = String(value);
        const date = new Date(text.includes("T") ? text : `${text}T00:00:00`);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function chartDateLabel(value, rangeDays) {
        const date = chartDate(value);
        if (!date) return value;
        if (String(value).includes("T")) {
          const options = rangeDays <= 2
            ? { hour: "2-digit", minute: "2-digit" }
            : { day: "2-digit", month: "short", hour: "2-digit" };
          return new Intl.DateTimeFormat("en-GB", options).format(date);
        }
        const options = rangeDays <= 90
          ? { day: "2-digit", month: "short" }
          : { month: "short", year: "2-digit" };
        return new Intl.DateTimeFormat("en-GB", options).format(date);
      }

      function chartHoverDateLabel(value, rangeDays) {
        const date = chartDate(value);
        if (!date) return value;
        if (String(value).includes("T")) {
          const options = rangeDays <= 2
            ? { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" }
            : { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" };
          return new Intl.DateTimeFormat("en-GB", options).format(date);
        }
        return chartDateLabel(value, rangeDays);
      }

      function chartRangeDays(data) {
        const first = chartDate(data[0]?.date);
        const last = chartDate(data[data.length - 1]?.date);
        if (!first || !last) return 0;
        return Math.abs(last - first) / 86400000;
      }

      function chartTickIndexes(data, maxTicks = 6) {
        if (data.length <= maxTicks) return data.map((_, index) => index);
        const lastIndex = data.length - 1;
        const indexes = new Set([0, lastIndex]);
        const step = lastIndex / (maxTicks - 1);
        for (let tick = 1; tick < maxTicks - 1; tick += 1) {
          indexes.add(Math.round(tick * step));
        }
        return Array.from(indexes).sort((a, b) => a - b);
      }

      /** @brief SVG line chart for portfolio value and optional normalized benchmarks. */
      function LineChart({ data, visibleBenchmarks }) {
        const [hoverPoint, setHoverPoint] = useState(null);
        const width = 820;
        const height = 270;
        const pad = 42;
        const series = [
          { key: "value", label: "Value", color: "#185fa5", width: 3 },
          { key: "invested", label: "Invested", color: "#8090a5", width: 2.5, dash: "6 5" },
          ...(visibleBenchmarks.sp500 ? [{ key: "sp500", label: "S&P 500", color: "#1c8c5a", width: 2.5, dash: "7 5" }] : []),
          ...(visibleBenchmarks.nasdaq100 ? [{ key: "nasdaq100", label: "Nasdaq 100", color: "#b45f06", width: 2.5, dash: "4 5" }] : []),
        ];
        const values = data.flatMap((item) => series.map((serie) => item[serie.key]).filter((value) => Number.isFinite(value)));
        const rawMax = Math.max(...values);
        const rawMin = Math.min(...values);
        const rawRange = rawMax - rawMin;
        const padding = rawRange > 0 ? rawRange * 0.08 : Math.max(Math.abs(rawMax) * 0.01, 1);
        const max = rawMax + padding;
        const min = rawMin - padding;
        const rangeDays = chartRangeDays(data);
        const tickIndexes = chartTickIndexes(data);
        const x = (index) => pad + (index / Math.max(data.length - 1, 1)) * (width - pad * 2);
        const y = (value) => height - pad - ((value - min) / (max - min || 1)) * (height - pad * 2);
        const path = (key) => {
          let started = false;
          return data
            .map((item, index) => {
              if (!Number.isFinite(item[key])) {
                started = false;
                return "";
              }
              const command = started ? "L" : "M";
              started = true;
              return `${command}${x(index)},${y(item[key])}`;
            })
            .filter(Boolean)
            .join(" ");
        };
        const handleHover = (event) => {
          if (!data.length || !values.length) {
            setHoverPoint(null);
            return;
          }
          const rect = event.currentTarget.getBoundingClientRect();
          const pointerX = ((event.clientX - rect.left) / rect.width) * width;
          const pointerY = ((event.clientY - rect.top) / rect.height) * height;
          let nearest = null;
          data.forEach((item, index) => {
            series.forEach((serie) => {
              const value = item[serie.key];
              if (!Number.isFinite(value)) return;
              const pointX = x(index);
              const pointY = y(value);
              const distance = Math.hypot(pointX - pointerX, pointY - pointerY);
              if (!nearest || distance < nearest.distance) {
                nearest = {
                  ...serie,
                  date: item.date || item.month || "",
                  value,
                  x: pointX,
                  y: pointY,
                  distance,
                };
              }
            });
          });
          setHoverPoint(nearest);
        };

        if (!data.length || !values.length) {
          return (
            <div className="chart">
              <svg viewBox={`0 0 ${width} ${height}`} role="img" aria-label="Portfolio performance chart">
                <text x={width / 2} y={height / 2} textAnchor="middle" fontSize="13" fill="#627083">
                  No visible history for this range.
                </text>
              </svg>
            </div>
          );
        }

        return (
          <div className="chart">
            <svg
              viewBox={`0 0 ${width} ${height}`}
              role="img"
              aria-label="Portfolio performance chart"
              onMouseMove={handleHover}
              onMouseLeave={() => setHoverPoint(null)}
            >
              {[0, 1, 2, 3].map((line) => {
                const yy = pad + line * ((height - pad * 2) / 3);
                return <line key={line} x1={pad} y1={yy} x2={width - pad} y2={yy} stroke="#d8dde5" />;
              })}
              {series.map((serie) => {
                const d = path(serie.key);
                return d ? (
                  <path
                    key={serie.key}
                    d={d}
                    fill="none"
                    stroke={serie.color}
                    strokeWidth={serie.width}
                    strokeDasharray={serie.dash}
                  />
                ) : null;
              })}
              {tickIndexes.map((index) => (
                <text key={`${data[index]?.date || data[index]?.month}-${index}`} x={x(index)} y={height - 10} textAnchor="middle" fontSize="11" fill="#627083">
                  {data[index]?.date ? chartDateLabel(data[index].date, rangeDays) : data[index]?.month}
                </text>
              ))}
              {hoverPoint && (
                <g>
                  <line x1={hoverPoint.x} y1={pad} x2={hoverPoint.x} y2={height - pad} stroke="#9aa5b1" strokeDasharray="4 4" />
                  <circle cx={hoverPoint.x} cy={hoverPoint.y} r="5" fill={hoverPoint.color} stroke="#ffffff" strokeWidth="2" />
                  <rect x="6" y={Math.max(16, hoverPoint.y - 14)} width="88" height="28" rx="7" fill="#ffffff" stroke="#d8dde5" />
                  <text x="50" y={Math.max(34, hoverPoint.y + 4)} textAnchor="middle" fontSize="12" fill={hoverPoint.color}>
                    {money(hoverPoint.value)}
                  </text>
                  <rect x={Math.min(width - 190, hoverPoint.x + 10)} y={Math.max(12, hoverPoint.y - 42)} width="176" height="36" rx="7" fill="#ffffff" stroke="#d8dde5" />
                  <text x={Math.min(width - 178, hoverPoint.x + 22)} y={Math.max(30, hoverPoint.y - 21)} fontSize="12" fill="#182230">
                    {hoverPoint.label}
                  </text>
                  <text x={Math.min(width - 178, hoverPoint.x + 22)} y={Math.max(45, hoverPoint.y - 6)} fontSize="11" fill="#627083">
                    {hoverPoint.date ? `${chartHoverDateLabel(hoverPoint.date, rangeDays)} - ${money(hoverPoint.value)}` : money(hoverPoint.value)}
                  </text>
                </g>
              )}
            </svg>
          </div>
        );
      }

      function AllocationBars({ holdings }) {
        return (
          <div className="stack">
            {holdings.map((holding) => (
              <div key={holding.ticker}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 5 }}>
                  <strong>{holding.ticker}</strong>
                  <span>{holding.allocation.toFixed(1)}%</span>
                </div>
                <div style={{ height: 9, borderRadius: 99, background: "#edf0f4", overflow: "hidden" }}>
                  <div style={{ width: `${Math.min(holding.allocation, 100)}%`, height: "100%", background: "#185fa5" }} />
                </div>
              </div>
            ))}
          </div>
        );
      }

      /** @brief Root React component for import, tracking, charting, and DCA workflows. */
      function App() {
        const [transactions, setTransactions] = useState(() => parseCsv(sampleCsv));
        const [prices, setPrices] = useState(initialPrices);
        const [apiAvailable, setApiAvailable] = useState(false);
